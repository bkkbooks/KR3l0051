body:
  text: 鐵圍山叢談卷二宋蔡絛撰冠禮肇於古國初草昧未能行因循至政和講之焉是時淵聖皇帝猶未入儲宫也初以皇長子而行冠於是天子御文徳殿百僚在位命官行三加禮畢當廷命字儀典特盛是日方樂作行事而日為之重輪也先是諸王冠止於宫中行世俗之禮謂之上頭而已由是而後天子諸子咸冠於外廷蓋自淵聖始樂曲凡有謂之均謂之韻均也者宫徵商羽角合變徵為之此七均也變徵或云殆始于周如戰國時燕太子丹遣荆軻於易水之上作變徵之音是周已有之矣韻也者凡調各有韻猶詩律有平仄之屬此韻也律吕隂陽旋相為宫則凡八十有四是為八十四調然自魏晉後至隋唐已有徵角二調之均韻矣孟軻氏亦言為我作君臣相悦之樂蓋徵招角招是也疑春秋時徵角已亡使不亡何特言剏作之哉唐開元時有若望瀛法曲者傳于今實黄鐘之宫夫黄鐘之宫調是為黄鐘宫之均韻可爾奏之乃么用中吕視黄鐘則為徵既無徵調之正乃獨於黄鐘宫調間用中吕管方得見徵音之意而已及政和間作燕樂求徵角調二均韻亦不可得有獨以黄鐘宫調均韻中為曲而但以林鐘律率之是黄鐘視林鐘為徵雖號徵調然自是黄鐘宫之均韻非獨有黄鐘以林鐘為徵之均韻也此猶多方以求之稍近於理自餘凡謂之徵角調是又在二者外甚繆悠矣然二調之均韻幾千載竟不能得徵角其終云古之樂備八音八音謂金石土革絲木匏竹土則陶也後世率不能令其克諧至政和詔加討論焉乃作徵招角招而補八音所闕者曰石曰陶曰匏三焉匏則加匏而為笙陶乃塤也遂塤篪皆入用而石則以玉或石為響配故鐵方響普奏之亦甚韶美謂之燕樂部八音盖自政和始玉輅始作自唐髙宗由髙宗武后明皇及聖朝真宗皇帝凡三至岱宗一至崧髙然行道揺頓仁廟晚患之詔創為一輅及告成因幸開寳寺􅂷簾於寺門命有司按行於通衢親視之焉新輅既先次引舊輅而舊輅輒有聲如牛鳴不肯前衆力挽之堅不動而止仁廟未幾登遐終不克御前新輅也其後神祖苦風眩每郊祀益惡舊輅之不安又詔别創之乃更攷古制加嚴飭甚美新輅既就天子未及御元豐八年之元日適大朝㑹有司宿供張設輿輅儀物於大慶殿下新輅在焉遲明撤去幕屋壞遂毁玉輅為之碎因殺傷儀鸞司士數十人未幾神祖復登遐是後有司乃不敢易但進舊輅以奉至尊靖康中議者將持五輅以遺金人然地逺不得聞厥詳舊輅之能神不也獨書其所聞者玉輅者乃商人之大輅古所謂黄屋左纛是也色本尚黄蓋自隋暨唐譌而為青疑以謂玉色為青蒼此因循繆爾政和間禮制局議改尚黄而上曰朕乗此輅郊而天真為之見時青色也不可易以黄乃仍舊貫而有司遂不敢更而玉輅尚青至今譌也國朝故事天子誕節則宰臣率文武百僚班紫宸殿下拜舞稱慶宰相獨登殿捧觴上天子萬壽禮畢賜百官茶湯罷於是天子還内則宰臣夫人在内亦率執政夫人以班福寜殿下拜而稱賀宰臣夫人獨登殿捧觴上天子萬壽仍以紅羅鎖金鬚帕繫天子臂退復再拜遂燕坐於殿廊之左此儒臣之至榮國朝􅂷拱殿常朝班有定制故庭下皆著石位日月引班則各有行綴首尾而趨就日位既謁必直身立俟本班之班首先行因以次迤􅆔而去謂之卷班常朝官者皆將相近臣與執事者而已故儀矩便習脱在外侍從嘗為守帥因事過闕還朝若帶學士待制職名則便當入綴本班然帥臣在外以尊大自慣乍入行綴又况清禁嚴肅率多周章失次故在内從臣共指目之每曰此下土官人又來也大觀初魯公進師臣及後又第邊功賞無官可遷時當宁意嚮有魚水之懽遂以玉帶賜之其錫乃所謂排方玉帶也排方玉帶近乘輿所御於是魯公惶懼力辭不能得因誦韓退之詩不知官髙卑玉帶懸金魚謂唐人有此遂奏請改製為方圍帶而佩金魚焉弗惟不敢近乘輿且諸親王佩玉魚亦有閒上始可之是後為故事諸王佩玉魚乃裕陵朝所創政和間魯公以師臣為建明堂使既考成因進呈面奏曰臣禮位極人臣矣矧罔功詎宜賞也第羣下之勞日覬覦不可用臣故絶其望願降㫖除臣外並次第推恩上曰明堂古盛典由祖宗來暨神考究論弗及成今賴卿力俾朕獲繼先志况為之使而澤不浹豈朝廷所以待元老者哉卿其毋辭而魯公懇請不已上不得已於公姑可之乃自招公輔共議所以賞魯公者即加陳魯兩國公苦辭且謂若祖宗以來有是故事臣亦拜今既創作茍受之即他日賞臣將何以為禮苐獨有王爵爾此決不可是聖恩之隆異適所以禍臣且臣行年七十願留以為贈也上察公之誠嘉嘆不已曰卿既如此容朕做禮數蓋於是三辭恩數批答乃親筆褒諭天語甚美而始俞焉兩國既許罷封上因賜魯公以三接青羅繖塗金從物塗金鞍異錦韉馬前圍子二百人大略皆親王禮儀獨無行扇耳魯公乃拜賜圍子者凡朝請使但止於皇城門外蓋懼小人之疑謗時多公之得體也至於兩國之封魯公謂所以榮先則不敢辭於是三代暨小君皆蒙兩國之贈今遂為故事崇政殿説書祖宗時有之崇寜中初除二人皆以𨼆逸起蔡窰者以嫡子能讓其官與庶兄而不出用其學行修飭召吕瓘者亦以髙節文學有盛名𨼆居弗仕數召不起始起仍遂其性乃詔以方士服隨班朝謁入侍經筵焉亦熈朝之盛舉者大觀政和之間天下大治四方嚮風廣州泉南請建番學髙麗亦遣士就上庠及其課養有成於是天子召而廷試焉上因策之以洪範之義用武王訪箕子故事髙麗蓋箕子國也一時稽古之盛蹈越漢唐矣昔我先人魯公遭逢聖主立政造事以致康泰每區區其間有毛滂澤民者有時名上一詞甚偉麗而驟得進用大觀中有趙企企道者以長短句顯如曰滿懐離恨付與落花嗁鳥人多稱道之遂用為顯官俾以應制㑹南丹納土企道之詞曰聞道南丹風土美流出濺濺五溪水威儀盡識漢君臣旌旗所指皆欣喜凱歌還歡聲載路一曲春風裏又曰萬年觴傜人北面朝天子而魯公深佳之然趙雅不樂以詞曲進公後不取焉政和初有江漢朝宗者亦有聲獻魯公詞曰昇平無際慶八載相業君臣魚水鎮撫風棱調燮精神合是聖朝房魏鳳山政好還被畫轂朱輪催起按錦轡映玉帶金魚都人争指丹陛常注意追念裕陵元佐今無幾綉袞香濃鼎槐風細榮耀滿門朱紫四方且瞻師表盡道一䕫足矣運化筆又管領年年烘春桃李時兩學盛謳播諸海内魯公喜為將上進呈命之以官為大晟府製撰使遇祥瑞時時作為歌曲焉又有晁次膺者先在韓師朴丞相中秋坐上作聽琵琶詞為世所重又有一曲曰深院鎖春風悄無人桃李自笑亦歌之遂入大晟亦為製撰時燕樂初成八音告備因作徵招角招有曲名黄河清壽香明二者音調極韶美次膺作一詞曰晴景初収風細細雲疎天淡如洗檻外鳳凰雙闕葱葱佳氣朝罷香烟滿袖近臣報天顔有喜夜來連得封章奏大河徹底清泚君王壽與天齊馨香動上穹頻降嘉瑞大晟奏功六樂初調角徵合殿春風乍轉萬花覆千官盡醉内家别勅重開宴未央宫裏時天下無問邇遐小大雖偉男髫女皆争氣唱之是時海宇晏清重譯向風屈膝請命天氣亦氤氲異常朝野無事日惟講禮慶祥瑞可謂昇平極盛之際其後上心弗戒羣璫用事自建儲後君臣多間伯氏因背馳而大生異吾遂得罪幾死於是魯公束手有明哲之歎矣蓋自七十嵗至八十徒旦夜流涕不已相繼開邊小人為政以致顛覆惜哉可為痛心吾猶記歌次膺之詞時政和太平追歎為好時節也故書其始末以示後世云大科始進文字有合則召試秘書省出六論題於九經諸子百家七十史及其傳釋中為目而六論者以五通為過焉以是學士大夫自非性天明洽筆陣豪異則不能為之也頃聞夏英公就試過適天大風吹試卷去不得所在因令重作亦得過是乃作物者故顯其記識華邁之敏妙爾盖六論猶易世獨以不記出處為苦昔東坡公同其季子由入省草試而坡不得一方對案長歎且目子由解意把筆管一擣而以口吹之坡遂寤此乃管子注也又二公將就御試共白厥父明允慮一有黜落奈何明允曰我能使汝皆得之一和題一罵題可也繇是二人果皆中噫久不獲見先達如此人物也國朝科制恩牓號特奏名本録潦倒於塲屋以一命之服而収天下士心爾亦時得遺才但患此曹多日暮塗逺而罕砥厲者又凡在中末之叙得一文學助教之目而已或應出仕蓋止許一任異時有援例力訴諸魯公丐更一任魯公笑而謂之曰汝一任矣世至今遂以為口實也國家初沿革五季故綱紐未大備而人患因循至熈寜制度始張於是凡百以法令從事矣元豐時又置一司􅎁令所葢欲凡一司局務成作一司局務之條式也吾嘗白魯公切謂為治恐弗在是然自熈豐迄今大扺八九十年而一司敕令終未成政和甲午有吿人殺其父天府獄具矣祐陵與魯公深恥之不欲洩苐命於獄賜盡焉當是時號治平萬國和洽君相日憂勤以政化為念如此及後七八嵗忽有老父來府言我出外久聞有人妄訴我子之殺其父者今不見我子何往懼有司之枉殺我子也果若何於是天府大窘時魯公頓以退閒而尹屬皆屢易而乾坤時寖入醉鄉矣遂廑得不治信乎獄詞之不可不慎者故著之古號百子帳者北之穹廬也今俗謂之氊帳神廟時慨然有志於四方思欲平四方乃詔新作百子帳將頒諸輔臣未就而泰陵繼之又弗及賜至太上崇寜間工人告落於是魯公洎執政官始皆拜其制度之華盛焉為本朝之一故事矣汾晉之俗悍而悖當五代國初時號難攻取昔太祖皇帝親征道過紫巖寺乃焚香自誓不殺一人晉人聞之於是堅拒不降太祖亦不敢戮一人久之以盛夏諸軍多洩疾遂班師後人或罪誓言之露機且不寤太祖所以降下太原矣又汾晉所恃而為吾患者鄰援也當是時驟得繼筠之捷因逐北班師之際遂盡徙忻代之民於内地六百里一無人烟蓋使其大軍來則無餉單師至必敗是太祖又已得太原烏在舉梃與刃而後言擊滅之哉後太宗繼代因一舉圍破而天下始大一統開寳初車駕親征偽漢引汾水灌太原城時屬盛夏藝祖露臂跣足亦不裹頭手自持刀坐黄蓋下督兵吏運土築堤以堰汾河城上望見矢石雨坌不避也水浸城者餘數版而已又命水軍乘舟且焚譙門幾陷㑹班師焉其後北人有使于偽漢者見水退而城始大圮而笑曰南朝知壅水灌城之利不知灌而決之則無太原矣人多其言真廟時澶淵之役與敵講解後命輔弼各具上其備禦䇿上曰朕求大臣計議因自為之畫付卿等可面授諸將也大致以真定為本敵若犯河間則中山策應保塞安肅擣虛而深入若犯中山則河間策應保塞安肅亦擣虛而深入若犯真定中山䇿應河間保塞安肅悉擣其虛分道而深入真定大軍勿輕動敵果長驅南來直犯大名則河間中山皆擣其虛而真定大軍始徐躡其後大名挫其鋭然後真定大軍悉力要擊之此真廟之親為圖者甚悉又神祖朝益修武備邊防雖糗糒畢具嵗必命中使就三帥監出亁糒新舊以相易且曝之焉顧佗器仗又可知矣嗚呼累朝規模宏逺皆若是也及後金人寒盟所謂大臣者皆阿諛後進而握兵柄主國論議者又多宦人略不知前朝區處用心貽厥之謀但茫然失措束手待斃遂終誤國家大計可傷也西羌嘉勒久盗有古凉州地號青唐傳子棟戩死其子苦弱羣下争强遂大患邊一曰人多零丁一曰青宜結果莊而人多零丁最􅃛果莊其亞也元豐末神廟詔諸將人多零丁俶擾王土既擅其國則彼用兵之際若旌弢之屬豈無獨異其狀者宜募猛士如能殺之或生捕得若有官雖白衣並拜觀察使不半載有禆將彭孫者果臨陣躍入斬人多零丁以其首獻詔拜彭孫觀察使於是果莊之勢孤未幾又生得屬元祐初也遂以其事奏告裕陵焉擒果莊之功蓋多得一時名臣文士歌詠因大流播然世獨不知斬人多零丁此青唐所以亡李丞相士美在北門與吾同班綴嘗言將聘大遼赴其花燕時遼主坐御床上後有烏熊皮蒙一物頗髙大久而似疲則以身倚之意其如古設扆狀爾俄於烏皮間時露一二人手足則㒺測其故也及日宴時熱乃見數番小兒在其中李為吾言而每哂之吾即答曰此乃鮮卑之舊俗如髙歡立孝武帝以黑氊覆七人以拜其上而歡居其一殆亦𩔖是乎㒺然未識也太上在政和初元時遣童貫以節度使副尚書鄭久中使遼人魯公時責居在錢塘聞而宻止上則無及當是時上宻報魯公則已有覘國之意矣北伐蓋自是而始俄其國亂有堇龍兒者乘亂舉兵擊斬牛欄寨之禆將且函其首來於是天意盛欲興師賴魯公力請而格時政和已六年矣得浮沉逮宣和初事益迫魯公語洩為伯氏得而愬諸上遂罷魯公相乃大鳩兵又將命元帥内外為大懼師垂起而狂寇方臘者作連陷二浙數郡適方傾兵旅未得殄平上心亦深悔此舉因而罷海上結約㑹童貫平方寇既歸與王丞相黼生隙黼大懼既患失遂媚貫奮當北伐事宣和四年夏不謀於衆兵乃遽起魯公時已退休亟請對具為上言丐止不可未幾伯氏亦有宣撫命於是魯公垂涕頓首上前曰臣不任北伐寜自甘閒退今臣子行誠無以曉天下願陛下保全老臣上不聽則曰臣請得以效括母又語伯氏吾將哭師也及後燕山告功魯公以表賀上其末云臣慮終而不慮始知守而不知通有靦初心徒欣盛烈上覽表將喜見顔色曰太師能自直守如此因以肴核酒醴頒賚甚寵俾公慶伯氏之歸也及後北方寒盟上為大懼宦者梁師成自抱前後結約文牘於上前上顧師成曰北事之起佗人皆誤我獨太師首尾道不是今至此莫須問佗否師成迫上耳宻奏久之上遂黙然而止嗚呼使羣小人不阿㒺則宗國豈至是故世但知魯公之不主北伐又或傳公之詩有百年信誓之句但未得其始末故書其略他盡見吾頃著北伐紀實二卷宣和嵗壬寅北伐事興夏五月出師是日白虹貫日童貫行而牙旗折五月伯氏繼之兵引去纔次夕所謂宣撫使認旗二為執旗者懐而逃去皆不獲又二師既在雄州地大震已天闗地軸出見於聽事上龜大如錢蛇猶朱漆相逐而行二師再拜納諸大銀奩而置城北樓真武祠中翌日視之天闗地軸俱死矣識者咸知其不祥靖康末敵騎再侵闕下尼雅滿一軍始至河陽河陽守遁去而河陽潰中原人多亡命者皆直大河而南走大河皆可涉也敵逐北而追之皆若𨗳之而過河焉吾得於避敵之親嘗者大河自古未始可涉獨後魏爾朱兆自富平津亦涉度而襲淮大抵患在計臣之左謀而俾小人因得歸之於時數寧不痛哉南俗尚鬼狄武襄青征儂智髙時大兵始出桂林之南道旁偶一大廟人謂其廟甚神靈武襄遽為駐節而禱之焉因祝曰勝負無以為據乃取百錢自持之且與神約果克捷則投此期盡錢面也左右或諫止一儻不如意恐沮師武襄不聴萬衆方聳視已揮手倐一擲則百錢盡紅矣於是舉軍歡呼聲震林野武襄亦大喜顧左右取百釘來即隨錢疎宻布地而釘帖之加諸青紗籠束手自封焉曰茍凱歸當償謝神始贖取錢其後破崑崙闗敗智髙平邕管及師還如言贖取錢與羣幕府士大夫共視之乃兩面錢也詔封廟曰靈順吾道過時夢甚異又得是事於其父老云熙寧十年交趾無故犯鄙遂并陷欽廉邕三郡多殺人民係虜其子女朝廷為赫怒出大師行討之時將遣内侍李憲行王舒公介甫力争其不可乃止而介甫亦罷矣於是吳丞相充王岐公珪皆以次當國命師郭宣徽逵而副以文臣趙卨征焉合西北鋭旅暨江淮將士多至十餘萬輜重輸不在也及入蠻境先鋒將苗履燕逵徑度富良江一擊散走其賊衆擒偽太子佛牙將進破其國矣逵聞而怒亟追還之欲斬二驍將於纛下賴卨救免因屯師於蠻地不戰者六十餘日大為交人慢侮逵苐遜辭僅取其要領且納賂得還報中原人不習水土加時熱疫大起於是十萬大師瘴癘腹疾死者八九既上聞神廟大不樂命窮治厥由久之乃得吳丞相與逵書劄曰安南事宜以經久省便為佳蓋逵承望丞相風指因致坐斃事未竟㑹吳丞相以疾薨於位得不治其後幾三十年當大觀之初吳丞相之二孫曰儲曰侔者以同妖人張懷素有異謀皆論死一時識者咸謂安南之役天之所報云嗚呼執事之人主國家謀議者可不慎哉可不戒哉章丞相惇性豪邁頗傲物在相位數以道服接賓客自八座而下多不平之然獨見魯公則不而魯公時在翰苑為承㫖亦自負章之不能以氣陵公也一日詣丞相府故事宰執出政事堂歸第有賔吏白侍從官在客次而大臣者皆捨轡即不還家徑從斷事所而下以延客及是章丞相反不揖客行入舍褫其公裳特易以道服而後出魯公方趨上適遽見之則亟索去於是章丞相作慙灼然而語公曰是必以衣服故得罪矣然願少留公曰某待罪禁林實天子私人非公僚佐藉令微顧不辱公乎遂起欲行去章以手接公目使留致懇到㑹薦湯而從者以騎至故公得拂袖因卧家具章白其事且以辱朝廷而待罪焉哲廟攬公深多公之得體亟詔釋之因有㫖宰臣章惇贖銅七斤仍命立法以戒後來自是魯公終章丞相之在相位而不以私見也噫前朝侍從臣卓爾風立廼如此後來罕見之元祐末宣仁髙后崩是嵗即改元紹聖哲廟既親政首拜章丞相惇右僕射故事拜相遣御藥院内侍一員齎詔宣押赴闕章丞相後見魯公宣詔事因曰大有破除也蓋前朝召大臣如齎詔内侍遇所歴郡縣凡土産名物大臣必以書遺之號書送者次第至闕乃止獨章丞相能知此故事故也其後魯公自錢塘復太師被召上曰御藥院皆老班懼溷擾卿特選命四方館使童使敏此朕親信俾賫詔仍以御筆手書十幅來意魯公不得力辭時公遂遵書送故事亦稍厭勞費笑謂吾曰賴吾章丞相語尚有此後人疑不復知前輩故事矣上清儲祥宫者乃太宗出藩邸時藝祖所錫予而建也中遭焚神廟時召方士募人將成之未就及宣仁髙后垂簾乃損其服御而考落焉因召東坡公為之記而哲廟自為書其額後泰陵親政元祐用事臣得罪遂毁其碑又改命魯公政更其辭魯公時為翰林學士承㫖也於是天子俾置局於宫中上璫數人共主其事號諸司者凡三日一赴局則供張甚盛肴核備水陸陳列諸香藥珍物公食輙書丹於石者數十字則上必有御香龍涎上尊椽燭珍瑰隨錫以歸凡百餘日碑成既出而金填其字人因爭取之一本售五千焉得數百本分賜羣臣餘詔藏之禁中吾嘗讀歐陽文忠公集見其為學士時抄國史仁廟命賜黄封酒鳳團茶等役入二府猶賜不絶國家待遇儒臣𩔖如此大觀之前吾竹馬嵗與羣兒戲適道文太師韓侍中語纔一吐則翁姥長者輩必變色以戒曰小後生不得亂道當是時去二公薨已數十年猶凜凜然尊嚴使人尚敬之若神豈非朝廷崇養其望至是蓋不若是無以表天下一其信從者其祖宗之深慮也及後所謂大臣國事既不克自重時吾已識事矣則但覩朝野日驚仇黨更相反覆於是士大夫進退之間與驅馬牛不異至使優兒街子動得以指訕之曾不足以備緩急私竊謂體貌重輕而然乎宰相堂食必一吏味味呼其名聽索而後供此禮舊矣獨菜羮以其音頗𩔖魯公姓諱故回避而曰羮菜至今為故事國朝禮大臣故事亦與唐五季相踵宰相遇誕日必差官具口宣押賜禮物其中有塗金鑴花銀盆四此盛禮也獨文潞公自慶厯八年入拜厥後至紹聖嵗丁丑凡五十年所謂間鍍鈒花銀盆固在遇其慶誕必羅列百數於座右以侈君賜當時衣冠傳以為盛事國朝之制待制中書舍人以上皆座狨雜學士以上遇禁烟節至清明日則賜新火往往謂之快行家者昧爽多就執政侍從之門茶肆民舍取火爇燭執之以燒纔未及寸殊有懽也吾家隆盛時出則聯騎列十三狨座遇清明得新火者九枝門户被天遇殊絶政和初至尊始踵唐徳宗呼陸贄為陸九故事目伯氏曰蔡六是後兄弟盡蒙用家人禮而以行次呼至於嬪嬙宦寺亦從天子稱之以為常也目仲兄則曰十哥季兄則曰十一吾亦荷上聖呼之為十三而内人又皆見謂蔡家讀書底嗚呼無以報稱且奈何宣和嵗己亥夏都邑大水莫知所由來嚮非城西索水之北有新築堤初架水之通宫苑者偶横阻得且止則此一夕灌城悉為魚鼈矣時給事中許翰崧老語魯公頃熒惑入天江有謝中美者謂後三年都邑必大水今驗矣魯公因語吾使訪其人且久一日原廟屬行香吾適待罪從班而待制綴行政在百寮前略相近有左司郎官李璆西美儳進吾後謂吾曰曩求謝中美不得此其人也吾頷之班退亟邀謝中美歸舍焉當是時世事亦可慮狂妄每私憂過計得見中美喜因共商確天官事中美自謂由唐以來治天官六世矣六世外不可得而推其家學大抵本太史公天官書而占以洪範太史公天官書者譬世六經視他天文猶百家耳欵叩中美中美曰佗占𩔖不足道獨大觀四年彗星逆行從閤道入紫宫再歸帝座此可畏者吾問占驗果若何則曰彷彿漢中平末也即呼主書吏開櫃取東漢志來因共視之見殺宦者易𢎞農而獻帝流離事吾大駭懼中美則以手摩拂書冊而言不必盡然要槩似之又問其期曰壬寅時辛丑春也吾更汗懾及壬寅不騐則曰當在乙巳後乙巳遂騐云又當癸夘嵗時中美監染院罷詣部授資州一旦之任執手言別曰願公自愛天下將亂矣獨蜀中良後堪足終我之殘齡焉未幾金人果寒盟有詔内禪靖康初兵民殺内侍其後兩宫北狩僣偽出天下亂於是新天子中興江左四川獨帖泰當中興睢陽時許翰崧老者適拜副樞而吾貶萬里外聞之謂翰必能薦召中美為中興用矣吾嘗有所聞中興之八載有劉公寳學子羽來自川陜佐宣撫使得罪吾與同處愽白始能道中美既罷資州厥後死矣亟問其子弟劉公曰無兒其書亦不傳焉今世略得其緒餘者獨襄陵許翰崧老次其粗則吾也惜哉崇寧間九重一夕有偷兒入内中由寢殿北過後殿西南歴諸嬪御閤又南直崇恩太后宫而出迨曉覺之有司罔測時魯公當國曰可捕治搭材士儀鸞司有逃逸者乎有司曰是夕儀鸞司獨單和者逃魯公亟捕單和來凡三日得於雍邱自肩至踵皆金器也鞫得其由蓋和善飛梯為儀鸞司第一手嘗經入禁闥供奉頗知曲折是夕用繩繫横木號軟梯孟翊有古學而精於易魯公重之用為學官嘗謂公言本朝火徳應中㣲有再受命之象宜更年號官名一變世事以厭當之不然期將近不可忽魯公聞而不樂屢止俾勿狂三年夏五月天子視朔於文德殿百寮班欲退翊於羣班中出一軸所畫卦象赤白解釋如平時言以笏張圖内唐突以獻上亦不樂編管逺方而翊死明年夏彗星出改元政和時事稍稍更易當是時人疑為翊之言頻騐其後十七年金人始寒盟十八年廼有中興事太上皇帝端邸時多徵兆心獨自負一日呼直省官者謂之曰汝於大相國寺遲其開寺時持我命八字往即諸卦肆徧問以吉凶來苐言汝命勿謂我也直省官如言至歴就諸肆問禍福大抵常談盡不合末見一人窮悴藍縷坐諸肆後試訪曰浙人陳彦也直省官笑之黽勉又出年命以示彥彥曰必非汝命此天子命也直省官大駭狼狽走歸不敢洩翌日還白端王王黙黙因又戒飭汝遲開寺宜再一往見苐言我命不必更𨼆於是直省官乃復見彥具為彥言彥復咨嗟久之即藉語顧其省官曰汝歸可白王王天子也願自愛踰年太上皇即位彥亦遭遇後官至節度使隂陽家流窮五行術數不為妄至一切聽之反棄夫人事斯誤矣是以古之人行道而委命不敢用億中以為信也先魯公生慶厯之丁亥其月當壬寅日當壬辰時為辛亥在昔幼時言命者或不多取之能道位極人臣則不過三數及逢時遇主君臣相魚水而後操術者人人争談格局之髙推富貴之由徒足發賢者之一笑爾大觀初改元嵗復丁亥東都順天門内有鄭氏者貨粉於市家頗贍給俗號鄭粉家偶以正月五日亥時生一子焉嵗月日時適與魯公合於是其家大喜極意撫愛謂且必貴時人亦為之傾聳長則恣聴其所欲為鬬雞走犬一切不禁也迨年十有八當春末攜妓多從浮浪人躍大馬游金明自苑中歸上下悉大醉矣馬忽駭入波水中浸而死蜀人謝石宣和嵗壬寅到輦下以術得名善相字使人書一字即知人之用意以卜吉凶其應如響遂得榮顯時宣和七年亟求歸臨別語吾曰石受恩者至今以武弁獲美官猶錦衣念無以報公徳惟有相字之術誠無人獨可以傳公公其受之時吾得罪併蹇自揣決不能慎口誨果更資以吉凶他術是益取禍故謝之不肯聴石石又語吾曰自是天下其亂矣獨蜀猶上在二十年外則不知也是時與公期蜀中相見吾更黙不敢答未幾流貶俄中原傾覆後二十有一年吾在鐵城因故人有帥成都者得寓書遂與石通寒温則二十年外期相見者如是乎然巧發奇中殊有懽故特疏其二三事於後始石居市邸人有失金帶者書一庚字以問石石曰汝有所失乎必金帶也然我知其人三日内使出果如期出魯公知而召之焉書一公字石曰公師位極人臣福壽若此必問所聞吉凶但表某㣲術者公師當少年時嘗更名爾魯公笑而頷之吾最晚生蓋不知此然雖伯氏樞府為長且亦不知也太上皇聞而宻異之嘗為書一朝字命示之石曰此非人臣也我見其人則言事詢何自知石曰大家天寜節以十月十日生此朝字十月十日也豈非至尊乎上喜乃召見石有問輒中且令中官索東宫書一字來乃以太字進又問石石曰此天子也左右為大懼上詢謂何石曰太字㸃㣲横此必太子也他日移置諸上豈非天字邪上以金帶賜之後聞石敗官在成都時國步適艱難詔天下科舉分路𩔖試而四川諸子萃於錦城石曰我能知蜀中魁也且亦知試題時諸儒生之好事者衆醵金錢若干俾石書所試題又書上七人科第名氏共緘識之及榜出取所書開示無一不騐大凡石能道人胸腹間意所以求望與人決禍福吉凶加勸戒以道理縱横罔測今嵗益久矣不知其存亡元豐末叔父文正知貢舉時以開寳寺為試塲方考一夕寺火大發魯公以待制為天府尹夜率有司趨拯焉寺屋既雄壯而人力有不能施穴寺廡大牆而後文正公始得出試官與執事者多焚而死於是都人上下唱言燒得狀元焦及再命試其殿魁果焦蹈也政和末王安中驟遷中書舍人往謝鄭丞相居中謂曰君作紫㣲舍人首草者何人詞邪安中答適一番官誥命爾鄭丞相曰若爾君必入政府居中聞前輩言入紫㣲為舍人首草番官誥詞者號利市必預政柄居中當時亦是蓋數已騐君其入二府乎後果然昔江南李重光染帛多為天水碧天水國姓也當是時藝祖方受命言天水碧者世謂逼迫之兆未幾王師果下建鄴及政和之末復為天水碧時争襲慕江南風流然吾心獨甚惡之未幾金人寒盟豈亦逼迫之兆乎政和以後道家者流始盛羽士因援江南故事林靈素等多賜號金門羽客道士居士者必錫以塗金銀牌上有天咸使佩之以為外飾被異寵又得金牌焉及後女真入國羣帥長皆佩金銀牌為兵號始悟前兆何不祥云洛陽古都素號多怪宣和間忽有異物如人而黑遇暮夜輒出犯人相傳謂掠食人家小兒且喜嚙人也於是家家扶杖待之雖盛暑不敢啓戸出寢號曰黑漢由是亦多有偷姦詐而為非者踰嵗乃止此五行志所謂黑眚者也不數年金人寒盟遂侵中國兩都皆覆靖康改元春正月金騎始入侵王黼乃得罪取道由咸平縣時不欲殺大臣而若使敵殘之者及中興之後偽楚張邦昌先黜居長沙後以罪賜自盡焉黼死於輔故村邦昌死於平楚門下官舍偽楚張邦昌始位中書舍人夢乗太上輦擁儀從出兩山間居輦上回視見二馬逐其後能記其毛色也後自燕山來受金封冊乃藉乘輿服御回顧二馬則如夢偽齊劉豫者為小官時夢至闕里拜仲尼仲尼輒答其拜又嘗夢拜釋氏為之起因獨自負遂果於僣然二者皆不克終也如夢兆肹蠁世或有之至吉凶則由乎人是以君子獨能守其正而獲其庥矣此昔人所以不貴乎徵夢吾得邦昌之二姪豫之鄉人王寺丞忠臣云鐵圍山叢談卷二
