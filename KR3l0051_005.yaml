body:
  text: 鐵圍山叢談卷五宋蔡絛撰天下蚊蚋都城獨馬行街無蚊蚋馬行街者都城之夜市酒樓極繁盛處也蚊蚋惡油而馬行人物嘈雜燈火照天每至四鼔罷故永絶蚊蚋上元五夜馬行南北幾十里夾道藥肆蓋多國醫咸巨富聲妓非常燒燈尤壯觀故詩人亦多道馬行燈火近世兒女戲有宵夜圖者多為博陸以競勝負而作宵字或可謂消長夜非也乃元宵夜圖耳吾待罪西清時於原廟祖宗神御諸殿閣遇時節則皆陳設玩好之具如平生時嘗得見宵夜圖者皆象牙局為元宵夜起自端門及諸寺觀作游行次第疑宵夜圖本此百戲諸伎甚精者皆挾法術元豐中有藝人善藏舟舟用數十人舉而置之當場萬衆不見也嘗經街樓前上下莫不駭異裕陵見之曰其人但行往來舟上耳固假誑不能誑真人金明池始太宗以存武備且為國朝一盛觀也其龍舟甚大上級一殿曰時來既嵗久紹聖末詔名匠楊談者新作焉久之落成華大於舊矣獨鐵費十八萬斤他物略稱是蓋樓閣殿既髙艦得重物乃始可運先是池北創大屋深溝以貯龍舟俗號龍奥者既納新舟而舊舟苐棄之西岸而已都城忽累夕大風異常不止衆懼為災雖哲廟頗亦􅋏頃風息方知新舊二舟即池中戰且三日矣新龍毁一目舊龍所傷獨甚後得上達哲廟怒降勑悉杖之始寧帖魯公崇寧末不入政事堂以使相就第時賜第於閶闔門外俗號梁門者修築之際往往得唐人舊冡或有誌文皆云塟城西二里大梁實唐宣武節度梁門外知已為墓田矣蓋多得婦人脛骨率長於今時長大男子幾寸焉或謂吾曰嘗親見陜晉間古長平為秦白起坑趙卒處白骨尚存其脛長大異隋唐時也知今人寖尠小釋氏之語或不妄李宻之死唐書謂徐世勣表請收藏其尸乃具威儀以君禮塟於黎陽山西南五里墳髙七仞及政和𨗳河由大坯將復禹跡因即三山而繫浮梁焉大坯者乃黎陽山也宻墳髙適當所𨗳河之衝有司以聞詔以禮改塟之時為部役者先發其壙則多取去金玉及奏下將改卜然不見其骸獨得頭顱且甚大傳又謂宻額銳而角方不知其故昔與小王先生者言王舒公介甫何至於無後小王先生曰介甫上天之野狐也又安得有後吾黙然不平歸白諸魯公魯公曰有是哉吾益駭魯公始乃為吾言曰頃有季士寧者異人也一旦因上七日入醴泉觀獨倚殿所之楯柱士大夫絡繹登堦拜北神者適睹一衣冠亟問之曰汝非貛兒乎衣冠者為之拜乃介甫也士寧謂介甫汝從之去踰一紀為宰相矣其勉旃蓋士寧出入介甫家識介甫之初誕生異故小字曰貛兒也介甫見士寧後果相神廟而士寧又出入介甫家適坐宗室世居事幾死賴介甫得免即尸解去矣吾得此更疑惑久之又白魯公造化坱圠天道鴻濛彼實靈物也獸其形中則聖賢爾今峩冠珮玉被於人也中或畜產多有焉要論其心斯可乎魯公為頷之而吾始得以自決政和末或於洛水得石大如拳色青黳有草字兩行作黄白文上之俄一士人又得洛石政相同亦上皆曰魯公天與之道急急欲公之奉行此必有召紹興嵗丙辰廣右大歉瀕海尤告病迄丁巳之春斗米千錢人多莩亡而嶠南風候素乖譌至是殊甚則李花退謝悉成桃桃實復成李梨亦變桃熟皆可食凡物多𩔖是有茄纍纍然枝間或結𤓰大如拳此吾親睹亦中原所罕始時士大夫起復則裹糙光幞慘紫袍黑角帶而已上意每惡之政和末議者謂入公門不應變服遂造請赴治所皆吉服與常時無别矣大凡有識之士不肯起復䘮次起䘮次者時多權要或無志之人爾鄭丞相居中政和七年遭母䘮去卒哭尚二日則已拜士大夫深惜之然居家猶服䘮也宣和後起復者雖在家奉其几筵如故至接賓客燕親舊蓋與常人無異禮義於是埽地李丞相士美邦彥由起復中拜相魯公時復入政地吾得出入禁闥一日遣邀吾吾已諾之矣適訪其親宻李公弼孺者乃是置酒出家妓作優戲以見待吾得此大懼力辭不去由是致疑因以得罪此亦獲戾之一端焉然李實賢者但不諒吾之狂也以著當時之習俗趙吉陽元鎮鼎者中興名宰相也一日於行在所因過三館食竟語坐上頃一夕忽夢以罪貶海上有耶將無是乎於是諸館職學士争道其徳而談休美曰公為國柱石安得有此其間一二輒又毅然更起白吉陽其門下士也藉苐使如夢則某等誓將乘桴而從公行決矣一時以為金石美談人故多之而傳達於四方焉未幾吉陽去相位俄廢黜於潮陽後果徙海上數年而趙吉陽死是時獨有一王海康趯者頗能為流人調䕶海上無資薪餐百物海康悉津致之又致諸家問勤懇不少寘厥後果為人告訐坐是免所居官而海康弗怨也當趙吉陽已死王海康始受代罷歸時過吾吾亟訪海康曩聞三館之語甚美今日有踐言者乎君居雷州雷州獨一路通海上旁無佗道君又喜與流人徃來宜悉知之願有所聞也王海康即笑謂吾曰寧有踐言者邪雖吉陽親舊曾弗覩一字之往來矣吾得此中心惄焉為之短氣且士大夫此風舊矣然豈無人乎懼世或未知便强謂曰必果若何嶠南苦熱雖盛冬數數有揮扇時吾㒒入十月矣偶感熱病呼醫診之曰伏暑又有博白守嘗題其便坐曰十有二月望劉子友納凉古者祀天必養牲必在滌三月佗牲唯具而已又凡祭祀之禮降神迎尸矣而後始呈牲牲入於是國君帥執事親殺之焉至漢魏而下有國有家者此禮寖日闕獨五嶺以南俚俗猶存也今南人喜祀雷神者得謂之天神祀天神必養大豕目曰神牲人見神牲則莫敢犯傷養之率百日外成矣始見而祀之獨天牲如此他牲則但取具而已又大凡祭祀之禮既降神而後始呈牲於是主人者同巫覡而共殺之乃畀諸庖烹而薦之焉又遇逐惡氣禳疾病必磔犬與古同殊有可喜者則傳謂禮失求諸野信然漢郊祀志言粤人信鬼而以雞卜李奇注謂持雞骨卜也唐子厚亦言雞骨占年考之今粤俗且不然實用雞卵爾其法先祭鬼乃取雞卵墨畫其表以為外象畫皆有重輕𩔖分我別彼猶易卦所謂世與應者於是北面詔鬼神而道厥事然後誓之投卵鐺中烹之熟則以刀横斷雞卵既中破焉其黄白厚薄處為内象用配外象之彼我以求其侵克與否凡卜病卜行人雅多有騐嶺右僻且陋而博白在嶺右又甚焉惟其僻陋而甚故俗淳古則多長年動八九十嵗不為異也大凡人本壽碩嗜慾思慮損之爾博白城下不百步則地號新村吾朝夕曳杖其間一日至村舍見大小環立者拱而有十餘人有兩老人坐飲乃兄弟也大者年九十四指其小者謂客曰此我幼弟亟問其年則曰纔七十八矣從旁環拱而侍之皆兩老人之曾孫是殆可入圖畫也又曽見數村媪聚首有不平色相共歎息頗甚吾詢諸媪胡為者諸媪對曰我巷南並舍翁昨暮死矣苐令我輩有所不滿爾問其年曰九十九吾失笑報諸媪九十九人安所謂得而不滿邪諸媪共辨析謂吾曰惜更一年且百嵗使滿百寜不可而天遽夭之邪長沙之湘西有道林岳麓二寺名刹也唐沈傳師有道林詩大字猶掌書於碑藏其寺中常以一小閣貯之米老元章為㣲官時游宦過其下艤舟湘江就寺主僧借觀一夕張帆擕之遁寺僧亟訟於官官為遣健步追取還世以為口實也政和上命取詩碑而内諸禁中亦倣道林而刻之石遍賜羣臣然終不若道林舊碑要不失真魯公始同叔父文正公授筆法於伯父君謨既登第調錢塘尉時東坡公適倅錢塘因相與學徐季海當是時神廟喜浩書故熈豐士大夫多尚徐㑹稽也未幾棄去學沈傳師時邵仲恭遵其父命素從學於魯公故得教仲恭亦學傳師而仲恭遂自名家及元祐末又厭傳師而從歐陽率更由是字勢豪健痛快沉著迨紹聖間天下號能書無出魯公之右者其後又捨率更乃深法二王晩每歎右軍難及而謂中令去父逺矣遂自成一法為海内所宗焉又公在北門有執役親事官二事公甚恪因各置白團扇為公扇凉者公心喜之皆為書少陵詩一聯而二卒大愠見不數日忽衣戴新楚喜氣充宅以親王持二萬錢取之矣願益書魯公笑而不答親王時乃太上皇也後宣和初曲燕在保和殿上語及是顧謂公昔二扇者朕今尚藏諸御府也元符末魯公自翰苑謫香火祠因東下無所歸止擬將卜儀真以居焉徘徊久之因艤舟於亭下米元章賀方囘來見俄一惡客亦至且曰承㫖書大字世舉無兩然其私意若不過賴燈燭光影以成其大不然安得運筆如椽者哉公哂曰當對子作之也二君亦喜俱曰願與觀公因命具飯磨墨時適有張兩幅素者食竟左右傳呼舟中取公大筆來即睹一笥從簾下出笥有筆六七枝多大如椽臂三人已愕然相視公乃徐徐調筆而操之顧謂客子欲何字邪惡客即拱而答某願作龜山字爾公乃大笑因一揮而成莫不太息墨甫乾方將共取視方回獨先以兩手作勢如欲張圖狀忽長揖卷之而急趨出矣於是元章大怒坐此二人相告絶者數日始講解乃刻石於龜山寺中米老自書其側曰山隂賀鑄刻石也故魯公大字自唐人以來至今獨為第一米芾元章有書名其投筆能盡管城子五指撮之勢翩翩若飛結字殊飄逸而少法度其得意處大似李北海間能合者時竊小王風味也魯公它日問芾今能書者有幾芾對曰自晩唐栁近時公家兄弟是也蓋指魯公與叔父文正公爾公更詢其次闕王晉卿家舊寳徐處士碧檻蜀葵圖但二幅晉卿每歎闕其半惜不滿也徽廟黙然一旦訪得之乃從晉卿借半圖晉卿惟命但謂端邸愛而欲得其秘爾徽廟始命匠者標軸成全圖乃招晉卿以觀視之因卷以贈晉卿一時盛傳人已􅋏異厥後禁中謂之就日圖者是以太上天縱雅尚已著龍潛之時也及即大位於是酷意訪求天下法書圖畫自崇寜始命宋喬年依御前書畫所喬年後罷去而繼以米芾輩迨至末年上方所藏率舉千計實熈朝之盛事也吾以宣和嵗癸夘嘗得見其目若唐人用硬黄臨二王帖至三千八百餘幅顔魯公墨跡至八百餘幅大凡歐虞禇薛及唐名臣李太白白樂天等書字不可勝㑹獨兩晉人則有數矣至二王破羌洛神諸帖真奇殊絶蓋亦多焉又御府所秘古來丹青其最髙逺者以曹不興𤣥女授黄帝兵符圖為第一曹髦卞莊子刺虎圖第二謝雉烈女貞節圖第三自餘始數顧陸僧繇而下不興者吳孫權時人曹髦乃高貴鄉公也謝雉亦西晉人烈女謂緑珠實當時所筆又如顧長康則古賢圖戴逵破琴圖黄龍負舟圖皆神絶不可一二紀次則鄭法士展子䖍有北齊後主幸晉陽宫圖文書法從圖之屬大率竒特甚至唐人圖牒已不足數然唐則度人經者乃禇河南書字而閻博陵繪其相𩔖多有此于今恨眼中亦無復茲覩矣每令人短氣蓋自政和間既好尚一行世因為之貨賂亦為時病此則良過矣虞夏而降制器尚象著焉後世由漢武帝汾隂得寳鼎因更其年元而宣帝又於扶風亦得鼎欵識曰王命尹臣官此栒邑及後和帝時竇憲勒燕然還有南單于者遺憲仲山甫古鼎有銘而憲遂上之凡此數者咸見諸史記所彰灼者迨魏晉六朝隋唐亦數數言獲古鼎器梁劉之遴好古愛奇在荆州聚古器數十百種又獻古器數種於東宫皆金錯字然在上者初不大以為事獨國朝來寖乃珍重始則有劉原父侍讀公為之倡而成於歐陽文忠公又從而和之則若伯父君謨東坡數公云爾初原父號博雅有盛名曩時出守長安長安號多古簋敦鏡獻尊彝之屬因自著一書號先秦古器記而文忠公喜集往古石刻遂又著書名集古録咸載原父所得古器銘欵由是學士大夫雅多好之此風遂一煽矣元豐後又有文士李公麟者出公麟字伯時實善畫性希古則又取生平所得暨其聞睹者作為圖狀説其所以而名之曰考古圖傳流至元符間太上皇即位憲章古始眇然追唐虞之思因大崇尚及大觀初乃倣公麟之考古作宣和殿博古圖凡所藏者為大小禮器則已五百有幾世既知其所以貴愛故有得一器其直為金錢數十萬後動至百萬不翅者於是天下塚墓破伐殆盡矣獨政和間為最盛尚方所貯至六千餘數百器遂見三代典禮文章而讀先儒所講説殆有可哂者始端州上宋成公之鍾而後得以作大晟及是又獲𬒳諸制作於是聖朝郊廟禮樂一旦遂復古跨越先代嘗有㫖以所藏列諸崇正殿暨兩廊召百官而宣示焉是時天子尚留心政治儲神穆清因從鎖闥宻窺聴臣僚訪諸左右知其為誰樂其博識味其議論喜於人物而百官弗覺也時所重者三代之器而已若秦漢間物非殊特蓋亦不收及宣和後則咸蒙貯録且累數至萬餘若岐陽宣王之石鼓西蜀文翁禮殿之繪像凡所知名罔間巨細逺近悉索入九禁而宣和殿後又剏立保和殿者左右有稽古傳古尚古等諸閣咸以貯古玉印璽諸鼎彞禮器法書圖畫盡在然世事益爛漫上志衰矣非復前日之敦尚考驗者俄遇䘮亂側聞都邑方傾覆時所謂先王之制作古人之風烈悉入敵營夫以孔父子産之景行召公散季之文辭十鼎象樽之規模龍瓿鴈燈之典雅皆以干戈攘擾殘缺失次湮滅散落不存文武之道古物之刼莫甚乎此言之可為於邑至於圖録規模則班班尚在期流傳以不朽云爾作古器説藝祖始受命久之隂計釋氏何神靈爾患苦天下今我抑嘗之不然廢其教矣日且暮則㣲行出徐入大相國寺將昏黑俄至一小院户旁則望見一髠大醉吐穢於左右方惡罵不可聞藝祖隂怒適從旁過忽不覺為醉髠攔胸腹抱定曰莫發惡心且夜矣懼有人害汝汝宜歸内可亟去也藝祖動心黙以手加額而禮焉髠乃捨之去藝祖得促步還宻召忠謹小璫爾行往某覘此髠為在不且以其所吐物狀來及至則已不見小璫獨爬取地上道吐狼藉至御前視之悉御香也釋氏教因不廢釋氏有旃檀瑞像者見於内典謂釋氏在世時説法於忉利天而復填王思慕不已請大目犍連運神力於他方取旃檀木攝匠手登天視其相好歸而刻焉釋氏者身長丈六尺紫金色人間世金絶不可擬獨他方有旃旜木者能比方故也瑞像則八尺而已蓋減師之半當釋氏在忉利時適休夏自西遂由天而下其瑞像乃從空而逆之即得授記汝後於震旦度人無量其後藏龍宫或出西域諸國按其説甚怪語多不載至梁武帝時發兵越海求之以天監之十有八年扶南國遂以天竺旃檀瑞像來因置之金陵瓦棺閣傳陳隋唐至偽吳楊氏南唐之李氏迄本朝開寳既降下江南而瑞像在金陵不没及太宗皇帝以東都有誕育之地乃新作啓聖禪院太平興國之末始命迎取旃檀洎寳公二像自金陵而内於啓聖置兩側殿其中如正寢者則熙陵之神御也其後取熙陵神御歸九禁大觀間魯公因奏請願以側殿之瑞像復之如正寢詔曰可特命將作監李名犯中興御諱内臣石燾主之故事奉安必太史擇時日教坊集聲樂有司具禮儀奉綵輿而安置之焉及樂大作綵輿者興轉至朶殿將上入正寢則朶殿横梁低下不可度瑞像輿又奉安時且迫衆為愕懼李監者恃其才笑曰此非難也亟召撘材工雲集命支撑諸棟梁盡斷以過像適經營間則主事者大呼曰勿鋸勢若可度矣萬衆亟回顧則見瑞像如人脅肩俛綵輿乃得行遂達正寢於是上下鼓舞駭歎所未曾見往往至泣下因即具奏當是時祐陵意嚮寖以屬道家流事頗不肯之又素聞慈聖光獻曹后曾禮像而於足下嘗度線且故事奉安則翌日天子必幸之昧爽上自以一番紙付小璫曰汝持此從乘輿後至是上既焚香立俟近輔拜竟乃臨視取小璫所持紙命左右從足下度之則略無纎碍於是左右侍從凡百十咸失聲曰過矣上為之再拜葢自神州陸沉即不知旃檀瑞像今在不也元祐嵗壬申魯公時帥長安因旱用故事上請禱雨於紫閣紫閣者終南之勝地及報可乃以軍府事付諸次官而自擕帥募兵甲行纔一夕矣翌旦飯竟與僚屬共愒大𣗳下𣗳旁有神祠焉兵將則多入其間坐未定忽羣走奔出長安素號多虎在外者睹人自祠廟中出奔疑有虎伏於廟於是衆争鳴鑼伐鼔露白刃團守魯公公曰徐之召出奔者即窮其所以乃曰祠殿上有土偶人旁積楮錢中若有物動搖者故疑其為虎公謂不然命二指使汝入往瞰則竊笑而出報曰乃一倮婦人坐楮錢中以楮錢自障其間爾公心動拉賓行往共視焉纔見公則長揖曰奉候於此三日矣公曰某何人辱仙姑惠也復曰本欲蜀中相見休止於此相見可也公曰某帥長安則又曰本待於蜀中相見爾因自舉手撫土偶人而謂公曰此亦有佛性公因嬲云此乃泥土瓦礫合成安得有佛性邪則亦喜笑曰不然一則非一二則非二當如是解遂起揖引去公亟展兩手横障之曰願以仙姑下山使萬人共瞻仰豈不美哉因顧公曰好事不如無倮其體略不畏恥委蛇而去矣望之行甚緩倐已在廟北山之上焉公悔亟遣人追其蹤則已不見竟罔測為何人公疑其為觀世音大士然世多謂是毛女魯公自紫閣禱雨還纔踰月果遷龍圖閣學士帥成都老王先生老志道人前事細㣲曲折有論罔不中韓文公粹彥吾妻父也嘗得手字曰慿取一真語天官自相尋不月餘自工部除禮部侍郎小天一日命吾紹介往見之老志喜即語小天曰紫府真人小天亦疾應曰先公魏國薨後有家吏孫勔日主洒埽因射大黿死被追故有紫府真人事或書於青瑣小說不謬也老志又曰紫府真人實因官之貴非天仙魏公功徳茂盛近始升諸天矣其初十華真人下侍者也小天疾應曰乃十華真人下侍者也二人相語即啐啄同時吾大為之駭小天徐語吾及老志曰先公晩在鄉郡但寢與食外朝夕惟處道室中静黙有獨坐至夜分者未薨之前遂自寤其身乃十華真人下侍者也時吾歎息不已而老志喜色自布夫此事獨吾得久矣恨世猶未知也仰惟魏忠獻王全徳祐世為本朝宗臣第一然其始也一真人下侍者而已今人動自負道家真伯釋氏果位恐悉過矣得不勉旃開寳寺災殿舍既雄故人力罕克施魯公時尹天府夜帥役夫拯之烟焰屬天矣睹一夫在屋上救火狀亟令傳呼當靳性命不宜前僧不顧處屋上經營自若俄透出屋壞僧墜於烈焰中人憤其不韙快之則又見在他屋往來不已益使傳呼萬衆在是猶不可施力汝一僧詎能撤也又不聽則復墜如是者出没四三竟曉火熄又謂是僧必死於是天府吏檢挍寺衆則俱在無一損獨於福勝閣下一阿羅漢像頭面焦􅀈汗珠如雨猶流未止故俗號救火羅漢後數游福勝閣下魯公指示得識之劉快活信之黔卒也不知何地人始以猖狂避罪入山中適有所遇遂能出神多作變怪與人言率道人吉凶雅有騐每自稱快活故時人呼之為劉快活喜出入將相貴人門又能為容成術所與游從老媪皆度為弟子容色光異或多至八九十嵗快活亦至百嵗然世常見獨作五十嵗顏狀爾丞相曽布在東府一夕近三鼔不得寐呼侍婢執燭視室中有聲侍婢曰此鼠嚙爾那得在帽籠中邪試舉手啓帽籠則有一劉快活尺許大因忽不見時劉快活在外方與門客對寢呼門客曰適誤入公内幾不得出也始知其為戲魯公每飲之酒無不大醉夜乃吐出魚肉穢惡狼藉旦人為屏除去悉御香也後之雍丘云雍丘其鄉井一日尸解去時都邑又有一人號風僧哥亦佯狂時時言事多中然風僧哥遇見劉快活輒戰栗逡廵退拱作畏避狀世莫曉其故豈所謂小巫見大巫者邪魏漢津黥卒也不知何許人自云遇李艮仙人以其八百嵗世號李八百者得尸解法已七世尸解復投他尸而再生漢津常過出龍門聞水聲謂人曰下必有玉因解衣投水抱石而出果玉也崇寧中召見製大晟樂鑄九鼎皆其所獻議初制樂一日與宦者楊戩在内後苑㑹上朝獻景靈宫還見漢津立道左觀車駕上望之喜遣小閹傳㫖撫問漢津因鞠躬以謝及還内戩至上曰漢津能出觀我邪戩曰不然早自車駕出漢津同臣視鑄工方共飲適聞蹕還臣捨匕箸遽至於此然漢津不出也上曰我適見之豈妄乎因呼小閹共證其故戩愕然知漢津能分身上雅重之漢津明樂律曉隂陽數術多奇中嘗私語所親曰不三十年天下亂矣鼎樂成亦封先王號然漢津每歎息謂猶不如初議未久死幾年忽有人自陜右附漢津書歸其家者仍遣封以示魯公始驗為尸解去王老先生老志者濮人也事親以孝聞幼曾為伯母吮疽初去為漕計吏持心公平能自守一毫釐不受人賄閲二十年其後每往來市間遇一丐人見輒乞之錢一旦丐人自言我鍾離生也因授之丹老志服其丹始大發狂遂能逆知未來事翰林學士强淵明紹聖初為教官過濮見老志授之書曰四皓明達且謂淵明必貴為主是事時吾亦與汝相見於帝闕矣及政和時貴妃劉氏薨追諡為明達皇后其制書果淵明視草始悟四皓者賜號也時太僕卿正亶薦之召老志館於魯公賜第上遣使詢明達事老志曰明達后乃上真紫虛元君且能傳道元君語以白上而上語亦遣白元君事甚夥然頗迂怪一日喬貴妃使問老志曰元君昔日與吾善今念之乎明旦老志宻封一書進上開讀乃前嵗中秋二妃侍上燕好之語喬貴妃得之大慟此亦異也詔封洞㣲先生當是郊天而天神為出夏祭方澤而地祇為應皆老志先時奏而啓發之又士大夫多從而求書字其辭始若不可曉後卒合者十八九故其門如市魯公謂慶賞刑威上之柄搢紳不應從方士騐禍福且不經而老志亦謹畏乃奏斷之老志日一食獨湯餅四兩冬夏衣一襲後云見師責以受羅縠之服且處富貴不知厭足凡有衣六七襲悉封還魯公及病乃力丐歸久之病甚上乃許其去及步行出就車不病也歸濮而死塟日又云若有笙簫雲鶴焉老志又獻乾坤鑑法上命鑄之鑑成老志宻奏謂他日上與鄭后皆有難深可儆懼願各以五色流蘇垂鑑置於所處之殿且臣死之後時時坐鑑下記憶臣語切謹慎必思所以消變者小王先生仔昔者豫章人也始自言遇許遜真君授以大洞𨼆書豁落七元之法能知人禍福老志死後仔昔來都下上知之召令踵老志事寓於魯公賜第大抵巧發奇中道人腹中委曲其神怪過老志逆知如見又自言晝見星事多不及載詔封通妙先生然魯公寖不樂因從容奏曰臣位軸臣輔政而家養方士且甚迂怪非宜上甚然之乃徙之於上清寳籙宫仔昔建議九鼎神器不可藏於外於是詔納鼎於大内其後宫人有為道士亦居寳籙宫者以奸事疑似發因逐仔昔性傲又少戅上嘗以客禮待仔昔故仔昔視巨閹若奴僕又欲使羣道士皆師已及林靈素出衆乃使道士孫宻覺發其語不遜下開封獄殺之陷昔者中官馮浩為力仔昔未得罪時先以書示其徒曰上蔡遇寃人仔昔死方四年而馮浩以罪竄適行至上蔡縣上命殺之焉靖康初言事者至謂魯公嘗欲使仔昔錦袍鐵幘以取燕山蓋誣云皇太子始冊拜將廟見具禮儀甚盛禮應乘金輅建大旂而議者從中大不然於是東宫遽辭而至獨前一夕設鹵簿於左掖門外翌日質明但常服御馬入太廟更禮衣冠逺遊執九寸圭而欵祖宗焉當是時清道親事官有呵哄言皇太子者父老都人争縱觀呼衆中一父老忽歎息曰我昔頻諳是傳呼今久不聞此聲矣考之仁廟雖嘗在東宫然罕出又未幾即大位獨真宗為皇太子歴年且數出入自至道乙未至政和甲午為年當百二十餘則老父者又不知幾何嵗人時太上方留神道家流事聞亟使散索已忽不見政和丙申汴渠運舟火因順流直下犯通津門者號東水門也通津既焚而火勢猛甚傍接體觀其日真武見於雲間神吏左右儼然萬皆瞻睹僧道楷淄川之村夫也始事真華嚴者不省乃自取一木横置大井上端坐作禪觀且九年一旦大寤便操筆作文偈無不通解道價日盛大觀間住持東都之净因禪院有天府尹李夀者雖法家然喜禪學特愛重楷時因陛見力譽之上曰朕久已欽其名也李夀退上即命中使錫以磨衲僧法衣而加賜四字禪師號者釋氏之異數然楷初弗知也中使忽持禮來楷不肯受之又故事院中應以白金五十鎰遺中使號書送而楷曰豈可以我故為常住費又止不予中使人亦悵不樂遂苦辭不受久之上乃命李尹喻㫖禮重殷勤然楷不回也使者前後凡十七往反而志益確上始大怒命坐以違制罪焉始迫逮楷天府也即有僧俗千許人隨之至庭下李尹慚因不敢出獨使其兩貳官於時為少尹者顧問是僧七十有幾邪楷曰六十有二矣二人黙相視失色即呼醫醫至又曰是僧痩顇疑若疾病狀行可騐之楷又大言曰道楷平生無病二人因低首私語如此則當杖矣楷笑曰不受杖何時乎於是編管沂州蓋臨淄將俾近其鄉井實李尹意至沂則道侣從之學益熾楷又厭之一旦忽失去衆走求諸郊野頃於山中得遂即山之上為立精舍而止其間焉後十許年乃死方其死時招聚衆曰汝等偕來嘗吾大酸餡食竟獨入深山久不出衆視之坐石上已跏趺而化矣嘗謂浮屠氏時有立志若是者頗恨吾士大夫近偶罕見之何哉道士李徳柔字勝之能詩善畫酷肖於傳神冩照出入公卿間東坡公有詩叙尹尊師可元甫生於李氏者徳柔也魯公亦喜得其戒徐王好色句數為大筆書之其後天子方嚮道家流事尊禮方士都邑宫觀因寖增崇侈於是人人争窮土木飾臺榭為游觀露臺曲檻華僣宫掖入者迷人獨徳柔漠然益示為朴魯羣黄冠多揶揄之遂聞於上上曰徳柔貧邪命賫錢五百萬俾新作其齋房徳柔不得已拜上乃為一軒而名之曰鼠壤上笑亦為之御書金字牓之宣和甲辰春徳柔一日報吾熒惑入端門之内有㫖俾皇城增貯水器我始悟熒惑星元解放火邪吾不能答其後竟坐誚神霄事被逐嘗謂世不乏人人物之是非蓋亦不得以一切論宣和嵗己亥夏都邑大水幾冒入城隅髙至五七丈久之方得解時泗州僧伽大士忽現於大内明堂頂雲龍之上凝立空中風飄飄然吹衣為動旁侍惠岸木义皆在焉又有白衣巾裹跪於僧伽前者若受戒諭狀莫識何故也萬衆咸覩迨夕而散白衣者疑若龍神之徒為僧伽所降伏之意爾上意甚不樂宣和六年春正月甲子實上元節故事天子御樓觀燈則開封尹設次以彈壓於西觀下天子時從六宫於其上以觀天府之斷決者簾幕重宻下無由知是日上偶獨在西觀上而宦者左右皆不從其下則萬衆忽有一人躍出淄布衣若僧寺童行狀以手指簾謂上曰汝是邪有何神乃敢破壞吾教吾今語汝報將至矣吾猶不畏汝汝豈能壞諸佛菩薩邪時上下聞此皆失措震恐捕執於觀之下上命中使傳呼天府亟治之且親臨其上則又曰吾豈逃汝乎吾故示汝以此使汝知無奈吾教何爾聽汝苦吾吾今不語矣於是箠掠亂下又加諸炮烙通詢其誰何畧不一言亦無痛楚狀上益憤復召行天法羽士曰宋沖妙世號宋法師者亦神奇至視之則奏曰臣所治者邪鬼此人者臣所不能識也因又斷其足筋俄施刀臠血肉狼藉上大不怡為罷一日之歡至暮終不得為何人付獄盡之嗚呼浮屠氏實有人嶺南僧婚嫁悉同常俗鐵城去容州之陸川縣甚邇一日令尹者入寺見數泥像乃坐亡僧也令尹為改觀且歎息顧謂羣髠曰是亦有坐亡者邪甚不易得胡為置諸庭忍死暴露而略不䘏邪其間一髠號敏爽亟前對曰此數僧今已無子孫矣聞者笑之鐵城有寓士成君相如酷喜道家流事吾問之子有所覩邪何迷而不復乎成君曰有也我少年時未識好惡頃在桂林與一韓生者游韓生嗜酒自云有道術初不大聽重之也一日相別有自桂過昭平同行者二人俱止桂林郊外僧之伽藍而韓生亦來夜不睡自抱一籃持匏杓出就庭下衆共往視之則見以杓酌取月光作傾㵼入籃狀争戲之曰子何為乎韓生曰今夕月色難得我懼他夕風雨儻夜黑留此待緩急爾衆笑焉明日取視之則空籃敝杓如故衆益哂其妄及舟行至昭平共坐江亭上各命僕厮辦治肴膳多市酒期醉適㑹天大風俄日暮風益亟燈燭不得張坐上墨黑不辨眉目矣衆大悶一客忽念前夕事戲嬲韓生曰子所貯月光今安在寧可用乎韓生為撫掌而對曰我幾忘之㣲子不克發我意即狼狽走從舟中取籃杓而一揮則月光燎焉見於梁棟間如是連數十揮一坐遂盡如秋天夜晴月光㶑灎則秋毫皆得睹衆乃大呼痛飲達四鼔韓生者又酌取而收之籃夜乃黑如故始知韓生果異人也成君又謂吾曰我時舟中與韓生欵曲輒數夕亦屢邀我索授其爐火及存養法然我不聽及别去不知所在後聞從瓊莞陳通判覺者周流海上數年至陸川而殂及舉塟但空棺知其尸解矣我始悔不從之學用是篤意於神仙事也吾既聞成君説後又五載適得識陳通判覺盡以訊陳而成君之言信鐵圍山叢談卷五
