body:
  text: 鐵圍山叢談卷四宋蔡絛撰范元實溫吾所畏友然不護細行吾以時士議勉之元實怒曰我不解今時士大夫不使人明目張膽直道而行率要作匿情詭行似王莽日事沽弔是誰倡此豈世美事邪吾每首肯焉又嘗與吾論時勢及開元天寶之末流元實曰不然天寶之勢土崩瓦解異乎今日魚爛也時魯公亦痛悔一日喟然而嘆數謂吾曰今復得陳瓘劉器之來意若可救藥乎吾語元實元實大喜語吾曰公之大人有此心豈獨海內乃公之福苐恐難得好湯使多咽不下爾元實亟持其書報二公而二公是嵗皆下世元實亦為其寵妾紅鸞所困俄得傷寒不數日殂可傷哉書此俾世知時不乏人伯父君謨號美鬚髯仁宗一日屬清閒之燕偶顧問曰卿髯甚美長夜覆之於衾下乎將置之於外乎君謨無以對歸舍暮就寢思聖語以髯置之外悉不安遂一夕不能寢蓋無心與有意相去適有間凡事如此童貫彪形燕頷亦略有髭瞻視炯炯頗不類宦人項下一片皮骨如鐵王黼美風姿極便僻面如傅粉然鬢髮與目中精色盡金黃張口能自納其拳大抵皆人妖也吾識黼於未得志時魯公獨忽之後常有愧色於吾黼始因何丞相執中進後改事鄭丞相居中然黼首恃奧援父事宦者梁師成蓋已不能遏翟參政公巽汝文有文名對人辭語華暢雖談笑歷歷皆可聽然不妄吐也政和間為給事中每見殿廷宣贊稱不要拜上殿祗候必咄咄曰不要拜此何等語旁問之君俾為何言乎公巽曰宜贊有㫖勿拜時蔡安世毋靖陳應賢邦光同在門下外省安世位公巽之上而應賢坐其下每相與談論二人必交闢之一日辭屈於是歎曰嗟乎遂厄於陳蔡之間范溫元實議論卓爾過人當宣和初嘗為吾言孫皓曰昔與汝為鄰今與汝為臣勸汝一杯酒令汝壽萬春武帝悔之及陳後主上隋文帝詩曰日月光天德山河壯帝居太平無以報願上登封書且一種降王就中後主真駑才外兄徐若谷字應叟賢德君子也常以吾清濁太分是非太明為戒常論古人若阮嗣宗口不臧否人物固為長者至於對人作青白眼則更甚於臧否吾服其語鹿溪生黃沇欽人也從學陳瑩中黃魯直文字固不凡與吾談經每歎今時為春秋者不採聖人之志但計數其後逐傳則論魯三桓鄭七穆窮經則㑹計書甲子者若干書侵書戰者為幾皆由漢二劉唐武平一啓其端是猶世愚者皆學佛而誦金剛經纂吾未曉迫問之則曰有一十三恆河沙三十八何以故國朝實録諸史凡書事皆備春秋之義𨼆而顯若至貴者以不善終則多曰無疾而崩大臣親王則曰暴卒或云暴疾卒以卒者如李縠是也暴疾卒如魏王德昭是也大凡前書不若後書前書猶庶至後書生紛競更易則益濶疏難取信也江漢字朝宗有宋史學惜乎猥以長短句辱其名也嘗與吾論史家流學當取古人用意處便見調度太史公曰投機之會間不容鮮忽班孟堅曰投機之㑹間不容髮至宋景文又曰投機之㑹間不容穟王性之銍博洽士也嘗語吾宋景文公作唐書尚才語遂多易前人之言非不佳也至若張漢陽傳前史載武后問狄仁傑朕欲得一好漢顧是語雖不文寧不見當時吐辭有英氣耶景文則易之曰安得一奇士用之此固雅馴矣然失其所謂英氣者吾不能答王元澤奉詔修三經義時王丞相介甫為之提舉蓋以相臣之重所以假命於其子也吾後見魯公與文正公二父相與談往事則每云詩書蓋出元澤暨諸門弟子手至若周禮新義實丞相親為之筆削者及政和時有司上言天府所籍吳氏資居檢校庫而吳氏者王丞相之姻家也且多有王丞相文書於是朝廷悉命藏諸祕閣用是吾得見之周禮新義筆跡猶斜風細雨誠介甫親書而後知二父之談信歌者袁綯乃天寶之李龜年也宣政間供奉九重嘗為吾言東坡公昔與客游金山適中秋夕天宇四垂一碧無際加江流澒漫俄月色如晝遂共登金山山頂之妙髙臺命綯歌其水調歌頭曰明月幾時有把酒問青天歌罷坡為起舞而顧問曰此便是神仙矣吾謂文章人物誠千載一時後世安所得乎五季文章趣卑陋甚矣然當時諸僭僞其國頗亦有人吾頃遊博白之燕石山號普光禪寺者為屋數椽而已其山迥絶洞穴怪奇得一碑乃僞漢時人為寺紀物喜其兩語曰蔬足果足松寒水寒熙寧初王丞相介甫既當軸處中而神廟方然一切委聽號令驟出但於人情適有所離合於是故臣名士往往力陳其不可且多被黜降後來者乃寖結其舌矣當是時以君相之威權而不能有所帖服者獨一教坊使丁仙現爾丁仙現時俗但呼之曰丁使丁使遇介甫法制適一行必因設燕于戲場中方便作為嘲諢肆其誚難輒有為人笑傳介甫叵堪然無如之何也因遂發怒必欲斬之神廟乃密詔二王取丁仙現匿諸王邸二王者神廟之兩愛弟也故一時諺語有臺官不如伶官熙寧間東平有名士王景亮者喜名貌人後反為人號猪嘴關世謂鄆有猪嘴關由此始繼有不肖者乃更從而和之自又為人號猪嘴關大使亦各有寮吏之目吕升卿者形貌短劣談論好舉臂指畫奉使過東平遂被目為說法馬留厥後相去將三十餘年王大粹靚以給事中出守東平乃𬒳目為香棖圓者蓋謂不能害人且不治病也凡輕薄類此昔魯公以元祐時亦帥鄆到即大㑹賓客把酒當廣坐謂之曰聞公號猪嘴關凡人物皆有所雌黃某下車來未幾然敢問其目其人曰已得之矣衆皆為􅋏公喜且笑而逼之則曰相公璞也東坡公元祐時既登禁林以髙才狎侮諸公卿率有標目殆遍也獨於司馬溫公不敢有所重輕一日相與共論免役差役利害偶不合同及歸舍方卸巾弛帶乃連呼曰司馬牛司馬牛崇寧初建三衛府多大臣與勳戚子弟一日衆坐共談西漢事有雋不疑者其人曰彼何故不來見大臣於是一時大傳為口實然不至是此特王甫道寀輕薄造以為笑寀有逸才時為三衛中郎後遭極刑崇寧中有一名士過浙右姑蘇有州將夙戒賞河魨者士人甚懼預語其家人我聞河魨有大毒中之必殺人今州將鼎貴且厚逆之必不可為之奈何儻一中毒是獨有人屎可救解汝輩當志吾言也及就之主人愧艴而謝客曰且力求河魨反不得幸貰其責願張飲以盡歡坐客於是咸為之竟醉士人者歸沉頓略不省人事因大吐其家人環之爭號謂果中毒矣夜走取人穢亟投以水絞取而灌之焉輒復吐則又灌不已舉室伺守天殆曉酒醒能語言始話不得河魨則已弗及米芾元章好古博雅世以其不羈士大夫目之曰米顛魯公深喜之嘗為書學博士後遷禮部員外郎數遭白簡逐去一日以書抵公訴其流落且言舉室百指行至陳留獨得一舟如許大遂畫一艇於行間魯公笑焉吾得是帖而藏之時彈文正謂其顛而芾又歷告諸魯公洎執政自謂久任中外並被大臣知遇舉主纍數十百皆用吏能為稱首一無有以顚薦者世遂傳米老顛帖頃一天府尹用吏能稱頗不大博約五鼓與侍從同坐待漏院舍忽語衆曰夜來不能寐偶讀孟子一卷好甜張臺卿內相閣隨答曰必非孟子此定唐書爾一坐為哄祖宗故事誕育王子公主每侈其慶則有浴兒包子並賚巨臣戚里包子者皆金銀大小錢金果塗金果犀玉錢犀玉方勝之屬如誕皇子則賜包子罷又逐後命中使人齎密賜來約頒諸宰相餘臣不可得也密賜者必金合多至二三百兩中貯犀玉帶或珍珠瑰寶及太上朝皇子既洗時何執中為相因力丐罷去密賜故事上可之後魯公召自錢唐而再相也與何傅適有皆召之美而何傅每歎近時錫賚薄少者魯公頓報知曰公所謂自作自受故也當是方粉飾太平務復古禮制一日殿庭講事罷共歸都堂魯公復向何傅歎行禮久頗厭疲勞何傅於是忽起而報曰此亦吾公師所謂自作自受矣公為之笑豫章郡王孝參曹王之次子曹王甚賢神廟季弟也於太上皇乃從兄弟且俊爽一時甚尊寵也號三大王者政和間始建春宮既事大體重乃命近戚奏告諸陵而三大王遂行朝廷亦為妙選行事官與之偕盡館閣上才一時之盛舉也諸名士既與王同塗而王亦自矜持朝夕談對簡札間獨喜用其字諸公為怏怏不樂且以其崇貴故不敢顯譏焉往返者多將及國門於是爭前叙別始僉約得共報之曰某等其有天幸獲侍大王其將半月不勝其榮幸今違履舄願大王保其玉體益其令聞某等不勝其依數十其而後歸莫不撫掌吾後數見宇文叔通虛中延康猶尚稱快不已范內翰祖禹作唐鑑名重天下坐黨錮事久之其幼子溫字元實與吾善政和初得為其盡力而朝廷因還其恩數遂官溫焉溫實奇士也一日游大相國寺而諸貴璫蓋不辨有祖禹獨知有唐鑑而已見溫輒指目方自相謂也曰此唐鑑貌也又溫嘗預貴人家㑹貴人有侍兒喜歌秦少游長短句坐間略不顧溫亦謹不敢吐一語及酒酣歡洽侍兒者始問此郎何人邪溫遽起叉手而對曰某乃山抹微雲女壻也聞者多絶倒蔡內相文饒薿以殿魁驟進晚知杭州稍失志時宣和間錢塘經方冦破殘後其用意將效張崖公領成都故事花判府有寡婦詣訟庭投牒而衣緋袴即大書曰紅袴白襠禮法相妨臀杖十七且守孤孀又有田殿撰升之登者名家亦賢者也綿歷中外一日為留守南都時郡下每以其名登故避為火忽遇上元於是榜於通衢奉台㫖民間依例放火三日遂皆被白簡至今遺士大夫談柄不可不知吳考功巖夫徑正有風槩吾畏友也吾取友必求諸巖夫而巖夫亦自喜知人宣和間出守洋州常以書付其甥周離亨者使傳致諸吾而吾不知也離亨即隂發其舅書見有羣賢名字其一乃許景行遂密送諸王丞相黼時當國正與魯公爭北伐事不相合既得巖夫書為奇貨藏之且幾年時巖夫已代還而景行又自除殿中侍御史矣一日上忽有意似向魯公者黼伺得之懼始發巖夫之書謂妄薦臺臣於大臣子弟也上偶震怒而巖夫與景行遂皆免所居官離亨乃得拜符寶郎於是朝班無小大咸揶揄目之曰青鳥其後周青鳥之名竟載白簡則士大夫樞機吁安得不慎長安西去蜀道有梓潼神祠者素號異甚士大夫過之得風雨送必至宰相進士過之得風雨則必殿魁自古傳無一失昔有王提刑者過焉適大風雨王心因自負然獨不驗時介甫丞相年八九矣侍其父行後乃知風雨送介甫也魯公帥成都一日召還遇大風雨平地水幾二十寸遂位極人臣何文縝丞相㮚政和初與計偕亦得風雨送仍見夢曰汝實殿魁聖策所問道也文縝抵闕下適得太上注道德經因日夜窮治及試策目果問道而何為殿魁李鬱林佩政和初出官尉芮城時因公事過河鎮偶監鎮夜同㑹坐數人相與共徵鬼神事鎮官為言乃者河中有姚氏十三世不拆居矣遭逢纍代旌表號義門姚家也一旦大小死欲盡獨兄弟在方居憂而弟婦又卒弟且獨與小兒者同室處焉度百許日其家人忽聞弟室中夜若與婦人語笑者兄知是弗信也因自往聽之審一日勵其弟曰吾家雖驟衰但世號義門吾弟縱喪偶寧不少待方衰絰未除而召外婦人入舍中邪懼辱吾門將奈何弟因泣涕而言不然也夜所與言者乃亡婦爾兄瞪愕詢其故則曰婦喪朞月即夜叩門曰我念吾兒之無乳而復至此因開門納之果亡婦遂徑登榻接取兒乳之弟甚懼自是數來相與語言大抵不異平時人且懼其怪而不敢以駭兄也兄念家道死喪殆盡今手足獨有二此是有欲亡吾弟爾且弟計不忍絶然吾必殺之因夜持大刀伏於門左其弟弗知也果有排門而入者兄盡力以刀剚之其人大呼而去扺旦焉視之則流血塗地兄弟因共尋血汙蹤迄至於墓所則弟婦之尸橫墓外傷而死矣㑹其婦家適至睹此而訟於官開墓則啓空棺而已官莫能治俄兄弟咸死獄中姚氏遂絶李鬱林者聞是始大不然鎮官即於坐命左右索其獄牘來視之乃信嗚呼亦異矣夫鬼神之事有不可致詰者漢五行志言元始元年朔方女子病死斂棺積六日出棺外類如此乎後三十一年時當癸亥夏四月㑹于郡齊李鬱林為吾道之即書以𥙷後世聽訟者之末也魯公在從班時以趙安定王甲第傍近宫闕便謁見因僦止焉其地甚古號多凶怪既入居之是夕有異人劉快活者謂魯公未宜寢也公曰諾召命酒與痛飲厪三鼓矣中堂黑暗處輒格格有聲甚厲忽覩一猴類人長大緩緩而出於外因忽不見時夜月倉卒故不大驚然劉但顧曰汝又勝他不過公亦大笑謂劉此豈非所謂山魈者邪遂偕就枕矣任宗堯者字子髙名家子仕至典樂後改服武辨終贈觀使宗堯多藝能洞曉天官律吕蓋其傳授於魏漢津先生宗堯始仕宦時即喜功名大觀末從尚書王寧中書舍人張邦昌使髙麗為上節人至四明則放洋而去不十日四明忽傳副使舶壞衆為痛之始時宗堯將登舟則寄所賫玩好琴書於相識故人家而邁及時傳也其故人者嗟惻一旦有女奴忽暴病不省遂為宗堯音訴其故人曰某所以涉鯨波萬里本希尺寸賞不謂遽持千金之軀而葬於魚鱉之腹故人念我乎某所寓三琴實平生所愛賞甲可歸之我家乙亦奇古當奉故人下者可與某凡所寓書畫篋笥中百物歷歷分區不遺一毫髮其故人大駭為奠哭久之女奴始蘇翌日則四明一郡皆傳謂使者舟壞信矣其後解歸使人自髙麗上下一無恙故人者得見宗堯歡喜竊笑洵異於常宗堯始疑而詢焉方道其事始知為黠鬼所侮吾親見宗堯之言雒陽大內興立自隋唐五代至聖朝藝祖嘗欲都之開寶末幸焉而宫中多見怪且適霖雨徒雩祀謝見上帝而歸矣是後至宣和又為年百五十久虛曠蓋自金鑾殿後雖白晝罕人敢入入亦多有異蠆或大於斗蛇率為巨蟒日夜歌哭絲竹之聲不絶也宣和末有監官吳本者武人恃氣不畏事夏月因納凉於殿廡間至晡時後天尚未昏黑而從者堅請歸舍不聽俄忽聞蹕聲自內而出即有衛從繽紛執紅綃金籠燭者數十對成行羅列中一衣黃人如帝王狀胸間尚帶鮮血擁從甚盛徐徐行由殿廡從本寓舍前過本與其從者急趨入户避之得詳瞰焉最後有一衛士似怒以納凉故妨其行從也乃以手兩指按其卧榻之四足遂穿磚而陷入地頃刻轉他殿而去遂忽不見本大駭自是不敢宿止其中矣因圖畫所見遍以示人雒陽士大夫多能傳之曰此必唐昭宗也吾頃嘗聞是事苐流落不偶久而忘七八矣偶流寓者趙令子與來猶能道其略因著於編劉器之安世元祐臣也晚在睢陽以鏹二十萬鬻一舊宅第或謂此地素凶不可止器之不信始入即有蛇虺四三出屋室間呼僕厮屏去則率拱立謂有鬼神不敢措其手器之怒改命家人輩自納諸筐篚而棄諸汴流翌日則蛇出益多再棄輒復又倍增不浹旬日乃至日得五七篚不已也器之不樂因自焚香於土地祠前曰此舍某用己錢易之者即是某所居矣蛇安得據以為怪乎始猶覬鬼神之有識而後悛革今不數日則怪益出是土神之不職爾且當受罰雖願仍其舊貫不可得也回顧從者盡掊土偶五六擲之河中召匠手為之改塑其神由是怪不復作㪷稱詐欺隂理至重鬱林有謝秀才者衣冠後也善以術籠人上下頗愛之於田井間為駔儈事每以小量輕權貨與人必用大器巨稱責償自喜其得計刺深非一日也人往往不覺一旦從以僕其手自捉升㪷諸誑具將入林野才出城東門未數里即雷雨驟興有黑雲追逐及霹靂一聲而謝秀才震死矣屢葬則屢為雷所發俟其肉潰散乃焚焉腹中得一雷楔也世人昧錐刀間一不顧義理至為鬼神所讎猶多不戒且甘以死何哉建炎當三祀金兵將踰江於是天子幸明而越隆祐太后龍輿駐豫章行臺從焉時警報益急有郎官侯懋李幾凡三人者於城東南隅得園林僻寂私相謂曰使敵一不可避得相與匿於是宜死生以之未幾行宫南邁倉卒之際果不克奔而北騎已遽入矣三人者得如約共竄於林因堂之巨梁上夜則潛下取食而還伏焉纍十數日矣幸略無人至者一旦忽多人物且沓至三人但伏梁之上計此豈皆避兵者邪胡為而至哉語未已即有敵騎數十百人繼來共坐於堂命左右邏捕男女無少長悉以梃敲殺之積尸旁午向暮盡死始去當是三人者伏據於梁惙惙然嚮脫一仰其首見必死矣敵騎既散皆謂得免况已昏夜俄復望紅紗燭籠數十對引𨗳有主者數人又至亦坐於堂即多羣吏據呼閲人姓名者三人益懼於此始不得脫矣及細下視之則但見人物可半見頭面俱弗辨乃知非人也凡㸃閲死籍至多輒悉呼其姓名中間偶呼至一名羣吏爭報曰不是不是類如是者凡有四三人者咸能記憶也夜半過矣事竟皆去逮曉則四顧鳥雀不聞聲知敵已洗城而引道矣即於亂尸中偶有呻吟聲三人共詢其名乃夜來羣吏所謂不是四人今悉復活矣異哉吾得於宋高州宋髙州得於佞懋懋等皆顯官不宜妄云栁州栁侯祠據羅池者不十許丈爾廟設甚嚴其神靈則退之固載諸文辭矣自吾於嶺外舉訪諸栁人云父老遞傳栁侯祠中輒聞鳴鑼伐鼓之聲亦時舉絲竹之音廟門夜閉逮曉則或已開每以為常近百許年則稍稍無此異矣又紹興乙丑嵗有楊經幹者過栁州因愒於祠則據其廡間以接賓客且笑語自若及還館舍才入夜忽仆而卒由是終畏之鐵城之小南街有龎攝官舍龎已死久矣一日其家木偶土地者忽自相毆擊不止家怪異之焚香拜禱又不止乃投於井中一夕於井中又出遂令僕逺送之然僕人者亦懼夜以楮錢纏木偶但潛置於稅務門小石橋下不敢逺人皆不知也石橋去行街止數百步翌日則街市人皆見木偶土地夫婦行於街衆大駭爭相傳報聚十百人而木偶土地自行街前以手相接抱而雙俱行轉街復抵稅務入其中捫頭因以繩繫於柱葉戎宰因下務見衆嚾噪詢之爭白曰木土地自行也葉戎曰豈有此理呼伍伯輩令二人持此木偶擲之江中後乃寂然此非所動而動在五行有兆當時趙守不法凶險生事人不奠居吾謂其有兵火之厄乎此紹興乙亥夏六月十有六日也親見之至九月末許簽判逖死十月趙守殂而楊司户又死南流黃知縣丁憂而去歐陽巡捕朱推官皆死次年六月葉戎又死此其驗矣鐵圍山叢談卷四
