body:
  text: 鐵圍山叢談卷一宋蔡絛撰太祖皇帝應天順人肇有四海受禪行八年矣當乾德之五祀而五星聚於奎明大異常魁下當曲阜之墟也時太宗適為兗海節度使則是太宗再受命此所以國家傳祚聖系皆自太宗應符既同乎漢祖而卜年宜過於周厯矣仁廟晚未得嗣天意頗無聊稍事燕游一日於後苑龍翔池南作兩小亭東一亭曰迎曙未幾立皇姪為皇子而賜名適與亭名合不一年即位是為英宗神宗當寧已負疾一日後苑池水忽沸且久不已神宗為睥睨而不樂有抱延安郡王從旁過者池沸輒止莫不駭異未幾延安即位是為哲宗哲廟元符時鄧王薨祈嗣於泰州徐守真世號徐神翁者天意切至徐曰上天已降嗣矣再三遣使迫詢其故即大書吉人二字上之一時莫曉後端王繼立始悟吉人者太上皇御名也政和間東宫頗不安其後日益甚魯公朝夕危懼保持甚至宣和庶子有孫宗鑑者時為紫微舍人密語魯公公毋慮昔哲廟惡百官班聯不肅而後臺史號知班者必贊言端笏立定又頃有八寶矣今復增而九之且名之曰定命寶春宫蓋始封定王世次為九則立定之語九寶之兆天其命之矣魯公頷之後宗鑑之言信政和間太上諸皇子日長成宜就外第於是取景龍門外地辟以建諸邸時鄆王有盛愛故宦者童貫主之視諸王所居侈大為最乃中為通衢東西列諸位則又共為一大門錫名曰蕃衍宅悉出貫也時愚甚懼蓋取詩之叙蕃衍盛大而下句則識者深疑之亦知其㫖意之屬在鄆邸而已後及都城傾覆然第三位乃今上果中興宣和嵗乙巳冬十二月報北方寒盟二十有三日上皇有㫖內禪時去嵗盡不數日故事天子即位踰年即改元於是中書擬進取日靖四方永康兆民二句請號年曰靖康焉靖康之初今上在康邸因出使講解而威德暴天下故識者多疑以謂靖康於字為十二月立康也是後一年而中興太上皇既北狩略不得中原信以宗社為念久之一旦命皇族之從行者食御手親將調羮呼左右俾出市茴香左右偶持一黃紙包以茴香來太上就視之乃中興赦書也始知其事於是天意大喜又謂夫茴香回鄉也豈非天乎於是從行者咸拜舞稱慶其後雖八駿忘返然鸞輿竟還矣中興嵗戊辰冬十有一月得之於韋侯者許慈寧皇太后之猶子也頃得罪髙凉召還道過於柴副車第嘗得太祖賜后詔一以藏之詔曰朕親提六師問罪上黨云云未有回日今七夕節在近錢三貫與娘娘充作劇錢千五百與皇后七百與充節料問罪上黨者國初征李筠時也娘娘即昭憲杜太后也皇后即孝明王皇后也嗚呼有以知聖祖不忘本者如此是安得不興太上以政和六七年間始講漢武帝期門故事初出時左右宦者必攜從二物以備不虞其一玉拳一則鐵棒也玉拳貢于闐玉大倍常人手拳紅錦為組以繫之鐵棒者乃藝祖仄微時以至受命後所持鐵桿棒者棒純鐵爾生平持握既而爪痕至今猶在恭惟神武得之艱難一至斯乎太宗始嗣位思有以帖服中外一日輦下諸肆有為丐者不得乞因倚門大罵為無賴者主人遜謝久不得解即有數十百衆方擁門聚觀中忽一人躍出以刀剚丐者死且遺其刀而去㑹日已暮追逋莫獲翼日聞奏太宗大怒謂是猶習五季亂乃敢中都白晝殺人即嚴索捕期必得有司懼罪久之迹其事是乃主人不勝其憤而殺之耳獄將具太宗喜曰卿能用心若是雖然第為朕更一覆毋枉焉且攜其刀來不數日尹再登對以獄辭并刀上太宗問審乎曰審矣於是太宗顧旁小內侍取吾鞘來小內侍惟命即奉刀內鞘中因拂袖而起入曰如此寧不妄殺人仁宗聖度深逺臨事不懼當寶元康定之時西夏元昊始叛而劉平敗死京師為雨血及報敗聞上喜曰天下平安久故兵將不知戰今既衄必自警宜少須之當有人出矣後果勝而元昊請服上又曰國家竭力事西陲纍數年海內不無勞弊今幸甫定然宜防盜發可詔天下為預防也㑹山東有王倫者焱起轉鬭千餘里至淮南郡縣既多備預故即得以殺捕矣又自秦漢以還時主能享國多厯年所者獨漢武帝在位五十五載然末年巫蠱事起成衛太子之禍梁武帝在位四十八載唐明皇在位四十五載是二君者亦終有侯景祿山之亂而我仁宗皇帝在位四十二年始終若一嗚呼休哉哲宗即位甫十嵗於是宣仁髙后垂簾而聽斷焉及寖長立未嘗有一言宣仁在宫中每語上彼大臣奏事汝胸中且謂何乃無一語邪上但曰娘娘已處分俾臣道何語如是益恭默不言者九年時又久已納后至是上年時十有九矣猶未復辟一旦宣仁病且甚尚時時出御小殿及將大漸謂大臣曰太皇以久病懼不能自還為之奈何大臣同辭而奏願供張天慶殿宣仁未及答上於簾內忽出聖語曰自有故事大臣語塞既趨下退相視曰我輩其獲罪乎翌日自上命軸簾出御前殿召宰輔諭太皇太后服藥宜赦天下不數日宣仁登仙上始親政焉上所以銜諸大臣者匪獨坐變更後數數與臣僚論昔垂簾事曰朕只見臀背魯公頃為愚道之亦深歎哲廟之英睿也頃有老內侍為愚道昭陵遊幸後苑每獨置一茶床列肴核以自酌有得一杯湯賜飲者以為寵幸非常乃張貴妃而已後追諡溫成皇后者也又有老吏嘗主睿思殿文字外殿庫事能言偶得見泰陵時舊文簿注一行曰紹聖三年八月十五日奉聖㫖教坊使丁仙現祗應有勞特賜銀錢一文嗚呼纍聖儉德類乃如此國朝諸王弟多嗜富貴獨祐陵在藩時嗜玩早不凡所事者獨筆硯丹青圖史射御而已當紹聖元符間年始十六七於是盛名聖譽布在人間識者已疑其當辟矣初與王晉卿侁宗室大年令穰往來二人者皆喜作文辭妙圖畫而大年又善黃庭堅故祐陵作庭堅書體後自成一法也時亦就端邸內知客吳元瑜弄丹青元瑜者畫學崔白書學薛稷而青出於藍者也後人不知往往謂祐陵畫本崔白書學薛稷凡斯失其元源派矣太上皇受命灼灼天人蓋多有祥兆由是善道家者流事晚建上清寶籙宫延接方士一日簾前有劉棟者上其所遇韓真人丹以獻天子其狀如蠟以手指揭取而服之翌日則又生無窮也上曰汝師錫汝長年而朕奪之非朕志也當簾前還之此與秦皇漢武異矣可謂盛德也哉慈聖光獻曹后佐佑仁廟定策立英宗神宗乃本朝后妃其間盛德之至者也其在父母家時與羣女共為撚錢之戲而后一錢輒獨旋轉盤中凡三日止及晚嵗疾病急顧左右問此為何日左右對以十月二十日實太祖大忌日也后頷之乃自語曰只此日去只此日去免煩他百官蓋謂不欲别日立忌使百官有司有奉慰行香之勞就是日則免於是以二十日崩今人學道號超脫非常一旦於死生之際未必能達變后之始終若此豈非天人乎哉神廟當寧慨然興大有為之志思欲問西北二方罪一日被金甲詣慈壽宫見太皇太后曰娘娘臣著此好否曹后迎笑曰汝甲甚稱好也雖然使汝至衣此等物則國家何堪矣神廟默然心服遂卸金甲慈聖光獻皇后以盛德著而宣仁聖烈髙后以嚴肅稱治平時英宗疾既愈猶不得近嬪御慈聖一日使親近密以情鐫諭之官家即位已久今聖躬又痊平豈得左右一無侍御者邪宣仁不樂曰奏知娘娘新婦始得嫁十三團練爾即不曾嫁他官家時多傳於外朝魯公在北門為承旨既草哲廟元符末命於是太上從端邸始即大位遂有垂簾之舉時欽聖憲肅向后命御藥院內侍黃庭經臣傳㫖曰嗣君已長本不應垂簾以皇帝聖孝宫中纍日拜請泣涕不已今姑循聖意才俟國事稍定則當還政必不敢上同章憲明肅與宣仁聖烈二后終身稱制卿可依此草詔明示天下當是時魯公既唯命即書所被㫖載諸學士院及家集是後雖同聽斷曾不半嵗永泰靈駕猶未發引即還就東朝之養矣外廷或譸張且不知欽聖盛德之本旨如此國朝禁中稱乘輿及后妃多因唐人故事謂至尊為官家謂后為聖人嬪妃為娘子至謂母后亦同臣庶家曰娘娘又呼掌書命之首曰內侍省次直筆內官之貴者則有曰御侍曰小殿直此率親近供奉者也御侍頂龍兒特髻衣襜小殿直皂軟巾裹頭紫義襴窄衫金束帶而作男子拜乃有都知押班上名長行之號唐陸宣公榜子集諫令渾瑊訪裹頭內人者是也知其來舊矣天子之制六璽元豐間得玉矣行製而未就至大觀時始成之然但繆也又元符初得漢傳國璽其文曰承天福延萬億永無極是二者祐陵又自倣為之悉魚蟲也號傳國璽曰受命寶九字璽曰鎮國寶合天子之制六璽是為八寶者乃於大觀戊子正月元㑹日受之因大赦天下本朝禮樂於此百五十年矣至是始備及後政和末又新作一璽上曰八寶者國家之神器今再創璽乃我受命者也因詔于闐國上美玉焉久而得之為璽九寸而魚蟲其文曰範圍天地幽贊神明保合太和萬壽無疆詔號定命寶是嵗戊戌元㑹於大慶殿受之太上始意作定命寶也乃詔于闐國上美玉一日絛赴朝請在殿閣侍班王內相安中因言近于闐國上表命譯者釋之將為答詔其表大有歡也同班諸公喜皆迫詢曰甚願聞之王內相因誦曰日出東方赫赫大光照見西方五百國中條貫主阿舅汗黑王表上日出東方赫赫大光照見四天下四天下條貫主阿舅大官家你前時要那玉自家㬠是用心只被難得似你那尺寸底我已令人尋討如是得似你那尺寸底我便送去也於是一坐為哄吾因曰裕陵實録已載于闐表文大略同此特少文勝者疑經史官手潤色故爾衆乃默然其後以玉來上長徑二尺色踰截肪誠昔未有也遂製定命寶嵗餘玉人始告成精巧視古無别矣寶與檢皆大九寸盤螭為紐魚蟲文凡有十六字於是定命寶合八寶通號九寶下詔以為乾元用九之義云𤣥圭者古鎮圭也溫潤異常文其色內赤外黑非世所有固無足疑圭上鋭而下方然其末平直非若後世禮圖為圭之太鋭也兩旁刻出十二山正若古山尊制度亦非若先儒所繪鎮圭乃於圭上刻山者也凡制作精妙又非若秦漢器玉所能及上則皆雲雷之文下平無文而中一竅大足容指其長尺有二寸正合周尺防同晉尺蓋晉得舜廟玉尺是以知同古尺也有制有𤣥圭議行於世誠不誣已𤣥圭傳乃丁晉公家物流落出嘗賣擔上士人王提舉敏文者以千七百金售得之有宦者談禎二得而上之時政和二年也上以付魯公曰或謂此物古𤣥圭試為朕驗之魯公機務繁又付之外兄徐若谷謂吾曰𤣥圭之制何可考得非雷楔邪然玉誠異常矣因置諸櫝中略不省一日吾與若谷讀禮記見王制言王執鎮圭釋謂旁刻十二山吾即以王制有王執鎮圭語若谷𤣥圭者旁有山政若古器所謂山尊同盍驗之乎若谷笑去手自去就櫝取圭出如吾語共數之果十有二刻始相與駭因試以義推之則罔不合若谷又白伯氏丐取太常寺厯代尺度石刻來則又合矣吾與若谷大喜以白魯公因以具奏昔𤣥圭議中魯公第一劄子是也但有一竅初忽之且謂豈非後人不知而穿之作響版邪及付外庭議禮官又引天子圭中必釋謂以組約其中央備失墜者若谷與吾甚愧弗思獨是不滿也上得此喜乃命宣示百官則禮匣錦薦色組繅藉十襲備極於崇奉遂以是嵗冬至御大慶殿受圭因又降詔歸美神考哲宗用告成功上親加上兩朝徽號令廟焉時詔議𤣥圭官並加秩而若谷每笑謂吾曰我一人其之推乎𤣥圭既出時晉州上一石有字曰堯天正石緑色方可三尺餘字當中咸大如掌其畫端楷政如人以手指畫之者堯字獨居右而天正兩字綴行於左朝廷驗之於都堂差官監視命工磨礱焉既去石三分而字愈明乃於堯字下又出一瑞蓋曰天正堯瑞若是則四字相對布置始勻天字瑞字其畫獨淺未與三者配則不敢更加礱於是內外咸喜謂晉陽堯都方𤣥圭出適有此瑞信天意也政和初內中降出大白玉璧一赤玉器一俾魯公考驗白璧大盈尺鏤文甚美而璧羡外復起飛行雲龍焉赤玉器則長幾二尺兩邊如棹刀頭中間為古文殊極精巧玉色則甚異誠雞冠之不足擬也當時諸儒謂璧羡雲龍者乃周公植璧之璧也赤玉器則顧命所謂陳寶赤刀之寶也吾竊笑諸儒之傅㑹且雲龍在上若植之寧不倒植矣豈非秦漢璧璫之屬乎至於赤刀寶制作非常三代之器無疑玉色又如此為希世之珍謂之赤刀若得之焉其後於延福宫又得見一赤刀同屬所錫元圭漢枳道所得傳國璽唐太宗之受命璽暨諸器列於殿中為盛世之英瑞唐太宗璽乃虞世南真書字玉色不大佳璽不方而長其文曰受天景命有德者昌崇寧甲申議作九鼎有司即南郊為冶用中夜時上為致肅不寐至是於寢望之焚香而再拜焉既乃就寢傍四鼓矣忽有神光達禁中政燭福寧殿紅赤異常宫殿於是盡明如晝逮曉始熄鼎一鑄而成乃取佑神觀旁地立九成宫隨其方為室成九室以奠鼎命魯公為奉安禮儀使又方其講事也輒有羣鶴數千萬飛其上蔽空不散翌日上幸之而羣鶴以千餘又來雲變色五彩光豔上亦隨方入其室焚香再拜從臣皆陪祠於下先是方士魏漢津獻議其制各取九州之水土內鼎中及行禮至北方之寶鼎也鼎忽漏水流浸布地且鼎金厚數寸水又素貯鼎中未始有罅隙不當及上焚香時泄漏漏乃旋止故上深訝焉魯公為不樂於是劉炳進曰鼎之水土皆取於九州之地中獨寶鼎者取其水土於雄州白溝之界上非幽燕之正方也豈此乎故當時尤以為神然厥後終以北方而致亂矣又政和六年用方士王仔昔建言徙九鼎入于大內作一閣而藏之時魯公為定鼎使及帝鼐者行亦有飛鶴之祥雲氣如畫卦之象帝鼐後改日隆鼎既甚大以萬衆拽之然行覺不大用力其去疾速時人皆異之政和初中間勢隆治極之際地不愛寶所在奏芝草者動三二萬本蘄黃間至有一鋪二十五里遍野而出汝海諸郡縣山石皆變瑪瑙動千百塊而致諸輦下伊陽太和山崩奏至上與魯公皆有慙色及復上奏山崩者出水晶也以木匣貯之進匣可五十斤而多至數十百匣來上又長沙益陽縣山溪流出生金重十餘斤後又出一塊至重四十九斤他多稱是太上即位之明年改元建中靖國者蓋垂簾之際患熙豐元祐之臣為黨故曰建中靖國實兄弟為繼故踵太平興國之故事也明年親政則改元崇寧崇寧者崇熙寧也崇寧至五年正月彗出乃改明年元為大觀大觀者取易大觀在上俱美名也大觀至四年夏五月彗出因又改明年元為政和政和者取庶政惟和之義也政和盡八年時方士援漢武故事謂黃帝得寶鼎神策是嵗己酉朔旦冬至為得天之紀而漢武但辛巳朔旦冬至然今嵗乃己酉朔旦冬至真得天之紀矣又太宗皇帝以在位二十年因大赦天下是時上在位已十有九年明年當二十年舉是二者乃下赦改十一月冬至朔旦為重和元年重和者謂和之又和也改號未幾㑹左丞范致虛言犯北朝年號蓋北先有重熙年時後主名禧其國中因避重熙凡稱重熙則為重和朝廷不樂是年三月遽改重和二年為宣和元年宣和政上自以常所處殿名其年然實欲掩前誤也因號宣和人又謂一家有二日為不祥及方臘起連陷二浙數郡上意彌欲易之獨難得美名㑹冦甫平而止七年冬遂內禪云大抵名年既不應襲用前代又當是時多忌諱以是為難合而古人已多穿鑿徵兆有自來矣至仁廟初始垂簾儒臣迎合時事年號天聖為二人聖明道為日月故後人咸祖述之至若元字謂神宗哲宗以元符元豐登遐且本朝火德不宜用水若治字又謂英廟治平不克久凡十數義或出於宦官女子之常談爾國朝故事諸王儀物視宰相張青絹傘畫繡鞍韉以親事官呵哄而已政和三年春二月上出西郊幸普安寺奠昭懷劉太后百官陪位上諡册罷還謁於瓊林苑御寶津樓上垂簾百官歸或不知皆騎從大道由樓下過燕越二王亦同途然百官往往不甚引避上訝之因申嚴其分乃賜二王三接青羅傘七紫羅大掌扇二金鈒花鞍若茶燎水罐凡儀物皆用塗金加異錦為鞍焉以壯維城之固是後遂為故事蓋自政和三年始又故諸王不施狨坐宣和末亦賜之國朝帝女封號皆沿襲漢唐初封則有美號稱公主出降則封某國公主兄弟又封某國長公主姑又封某國大長公主祖姑則封兩國大長公主而皇族則稱某郡主某縣主熙寧朝嘗議以乖義理然終不克改作政和三年上又惡其不典咸欲追述號公主為帝嬴郡縣主宜為宗嬴乃合於前代矣上曰此議雖近古特不合時宜因諭大臣曰姬雖周姓後世亦以為婦人之美稱蓋不獨為姓也在我而已魯公於榻前忽力爭上愕然詢其所以魯公謂臣乃姬姓也懼有嫌使小人得以議爾上笑而不從乃降手詔引熙寧欲釐革而有司不克奉承以至今日周稱王姬見於詩雅姬雖周姓考古立制宜莫如周今帝天下而以主封臣可改公主為帝姬郡主為宗姬縣主為族姬其稱大長者可並依舊為大長帝姬仍以美名二字易其國號內兩國者以四字於是魯公退而具書於時政記當是時執政者皆歎息魯公傷弓故慮患之深也是後因又改郡縣君號為七等郡君者為淑人碩人令人恭人縣君者室人安人孺人俄又避太室人之目因又改曰宜人其制今猶存唐有𢎞文集賢史館皆圖冊之府本朝草昧至熙寧始大備乃直左升龍門建祕書省聚書養賢其間并三者皆在故號三館祕閣以盛大一時目之為木天也中更天聖之後再立視舊亦甚偉而祕書省之西切鄰大慶殿故於殿廊闢角門子以相通遇乘輿出必由正寢而前則祕書省官自角門子入而班於大慶殿下迓車駕起居及還內亦如之可謂清切矣以是諸學士多得由角門子至大慶殿納凉於殿東偏世傳仁祖一日行從大慶殿望見有醉人卧於殿陛間者左右亟將呵譴詢之曰石學士也乃石曼卿神廟遽止之避從旁過政和五年因建明堂有㫖徙祕書省出于外在宣德門之東亦古東觀類云祕書省自政和末既徙於東觀之下宣和中間始告落上因踵故事為幸之御手親持太祖皇帝天翰一軸以賜三館語羣臣曰世但謂藝祖以神武定天下且弗知天縱聖學筆札之如是也今付祕閣永以為寶於是大臣近侍因得瞻拜太祖書札有類顔字多帶晚唐氣味時時作數行經子語又間有小詩三四章皆雄偉豪傑駭動人耳目宛見萬乘風度往往跋云鐵衣士書似仄微所遊戲翰墨也時因又賜閣下以小李將軍唐明皇帝幸蜀圖一橫軸吾立侍在班底睹之胸中竊謂御府名丹青若顧陸曹展而下不翅數十百今忽出此何不祥邪古人之於朝覲㑹同得觀其容儀而知其咎休則是舉也厥有兆矣邈在炎陬而北望黃雲書此疾首天下曹務罔不設張規條如祕書省號三館祕閣實育才也獨不以吏事責故許置棊局然大內前後殿諸班衛士宿直寓舍反亦得之蓋祕書省本優賢俊宿衛士則慮其終日端閉俾不生他意此咸出祖宗之深㫖祖宗時朝班燕㑹多襲用唐制樞密使乃宦者為之也其位叙甚卑故遇大燕則親王一人伴食于客省又燕設則親王宗室率不坐以用倡故也國朝樞密使乃儒士為之實股肱大臣至神廟時謂用倡則君臣亦不合禮始改為女童隊小兒隊於是樞密使親王宗室皆得列坐而預燕㑹矣閣門官者有東上西上閣門使號橫行班後改左右武大夫然任上閣之職者則自稱知東上閣門知西上閣門事又舊有通事舍人主贊喝後改宣贊舍人而閣門宣赦書白麻舊制則皆為吟哦之聲政和間詔除去但道勿吟焉至今尊用之漢魏以來警夜之制不過五鼓蓋冬夏自酉戌至寅卯斗杓之建盈縮終不過五辰故言甲夜至戊夜或言五更而已然日入之後未至甲夜則又謂之昏刻至五更已滿將曉之時則又有謂之至夜漏不盡刻國朝文德殿鐘鼓院於夜漏不盡刻既天未曉則但撾鼓六通而無更㸃也故不知者乃謂禁中有六更吾頃政和戊戌未得罪時曽侍祠於宣和殿深疑之近嘗備聞之上元張燈天下止三夕都邑舊亦然後都邑獨五夜傳謂吳越錢王來朝進錢若干買此兩夜因為故事非也蓋乾德間蜀孟氏初降正當五年之春正月太祖以年豐時平使士民縱樂詔開封增兩夜自是而始開寶末吳越國王始來朝國朝上元莭燒燈盛于前代為綵山峻極而對峙於端門綵山故𨽻開封府儀曹及儀鸞司共主之崇寧後有殿中省因又移𨽻殿中與天府同治焉大觀元年宋喬年尹開封乃于綵山中間髙揭大榜金字書曰大觀與民同樂萬夀綵山自是為故事隨年號而揭之蓋自宋尹始國朝之制立后建儲命相於是天子親御內東門小殿召見翰林學士靣諭㫖意乃鎖院草制付外施行其他除拜但廟堂僉議進呈事得允然後中書入署第使御藥院內侍一員持中書署狀內降封出宣押當直學士院鎖院竟乃以內降付之俾草制而已故相位有闕則中外側耳聳聽一報供張小殿子必知天子御內殿者乃命相矣太上自即位以來尢深考慎雖九禁至密亦不得預知獨自語學士以姓名而命之也及晚嵗雖倦萬幾然每命相猶自擇日在宣和殿親札其姓名於小幅紙緘封垂于玉柱斧子上俾小璫持之𨗳駕於前自內中出至小殿上見學士始啓封焉以姓名垂玉柱斧子政與唐人金甌覆之何異掖庭宫嬙嵗給帛多色綵爾遇支賜俸稍絹應生白者多即一束十端必間有一端為紅生絹蓋忌其純白故也此亦國朝太平一故事國朝燕集賜臣僚花有三品生辰大燕遇大遼人使在庭則內用絹帛花蓋示之以禮儉且祖宗舊程也春秋二燕則用羅帛花為甚美麗至凡大禮後宫謝上元節游春或幸金池瓊苑從臣皆扈蹕而隨車駕有小燕謂之對御凡對御則用滴粉鏤金花極其珍靃矣又賜臣僚燕花率從班品髙下莫不多寡有數至滴粉縷金花為最則倍於常所頒此盛朝之故事云政和初上始躬攬乾綱不欲付諸大臣因述藝祖故事御馬親巡大內諸司務在奉宸庫古龍涎司中又至內後拱宸門之左對後苑東門有一庫無名號但謂之苑東門庫乃貯毒藥之所也外官一員共監之皆二廣川蜀每三嵗一貢藥有七等野葛胡蔓皆預鴆乃在第三其上者鼻嗅之立死於是親筆為詔取㑹到本庫稱自建隆以來不曾有支遣此皆前代殺不廷之臣籍使臣果有不赦之罪當明正典刑豈宜用此可罷其貢廢其庫將見在毒藥焚棄瘞于逺郊仍表識之毋令牛畜犯焉嗚呼上聖至仁大哉堯舜之用心也國朝肆眚故事三省樞管諸房吏分陳其應行事訂諸官長粗以為當則宰輔於是共議於都堂而可否之事目已定逮將上進御乃入熟降付翰林學士院命詞而宣付外焉其約束之辭大致悉吏文也獨大觀戊子元日受八寶大赦如罷重法地分宗室升行省刑名寬黨錮凡數十事以事體既重方朝廷彰明其不如吏文時多出魯公之手故獨為國朝之盛舉唐制北門學士在內朝廷樞密使班遇天子夀節學士待制自從樞密院先啓建道場罷散花宴及壽節日則宰臣預命直省官具帖子請學士待制赴尚書省錫宴齊筵故中外文武百僚罔有不隸尚書省班屬御史臺者獨學士待制不隸外省班自屬閣門號稱內朝官又曰西班官則儒者清貴其為世之榮如此始熙寧時親御飛白書玉堂之署四字以賜承㫖蘇易簡及泰陵朝魯公亦為承㫖以其下一字犯厚陵御諱因奏請苐摹玉堂二字榜於翰苑之正㕔且為儒林之榮制曰可於是錫上牌燕近臣館閣畢集天子寵賚非常有踰故事為一時之光華云魯公為北門承㫖時翰苑偶獨員當元符末命召入內東門草哲廟遺制既末發喪事在祕密獨學士與宰執而已於是知樞密使曽布捧研以度魯公左丞叔父文正公為磨墨宰臣章惇手自供筆而授公焉魯公後每曰始覺儒臣之貴也祕書省嵗曝書則有㑹號曰曝書㑹侍從皆集以爵為位叙元豐中魯公為中書舍人叔父文正公為給事中時青瑣班在紫微上文正公謂館閣曝書㑹非朝廷燕設也願以兄弟為次遂坐魯公下是後成故事世以為榮國朝儀制天子御前殿則羣臣皆立奏事雖丞相亦然後殿曰延和曰邇英二小殿乃有賜坐儀既坐則宣茶又賜湯此客禮也延和之賜坐而茶湯者遇拜相正衙㑹百官宣制才罷則其人親抱白麻見天子於延和告免禮畢召丞相升殿是也邇英之賜坐而茶湯者講筵官春秋入侍見天子坐而賜茶乃讀讀而後講講罷又贊賜湯是也他皆不可得矣樞密院故事樞密使在院延見賓客領武臣詞訟必以親事官四人侍立仍置大鐵方尺二於領事案上蓋國初武臣皆百戰猛士至密院多有所是非干請故為之防微宣和四年既開北邊度支異常於是內外大匱上心不樂時王丞相既患失遂用一老胥謀始為免夫之制均之天下免夫者謂燕山之役天下應出夫調今但令出免夫錢而已御筆一行魯公為之垂涕一日為上言曰今大臣非所以事陛下也陛下聖仁惠養元元澤及四海矧前日之政但取地寶走商賈未嘗及農畞今大臣於窮百姓口中斂飯碗以取用錢甚弗取也上亦悔亟令改作聖㫖行下然無益矣自是作俑故動敷田畝因習以為常不但祖宗朝蓋崇觀政和之所無者是時天下免夫所入凡六千二百餘萬緡朝廷樁以備緩急至宣和七年春已用之止餘六百萬緡爾外二千二百餘萬緡有司奏不知下落此黼密以奉宴私者蓋自啓北征則省中創立一房號經撫房及告功黼遽奏請凡經撫房文籍盡取焚之故不得稽考國朝之制沿襲五季始時武臣皆不喪其父母至仁廟乃詔崇班以上持喪供奉官以下不持喪政和初方講太平故事且亦順人情乃詔供奉官以下願持喪者聽當是時雅愜衆心小使臣往往喪其父母者多矣不二十年世變風移今罔睹不願持喪者鐵圍山叢談卷一
