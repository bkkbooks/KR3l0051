body:
  text: 鐵圍山叢談卷六宋蔡絛撰昭陵晚嵗開內宴蓋數與大臣侍從從容談笑嘗親御飛白書以分賜仍命內相王岐公禹玉各題其上更且以香藥名墨遍賚焉一大臣得李超墨而君謨伯父所得乃廷圭君謨時覺大臣意歎有不足色因密語能易之乎大臣者但知廷圭為貴而不知有超也既能易輒欣然及宴罷騎從出門內去將分道君謨於馬上始長揖曰還知廷圭是李超兒否宣州諸葛氏素工管城子自右軍以來世其業其筆制散卓也吾頃見尚方所藏右軍筆陳圖自畫捉筆手於圖亦散卓也又幼嵗當元符崇寧時與米元章輩士大夫之好事者爭寶愛每遺吾諸葛氏筆又皆散卓也及大觀間偶得諸葛筆則已有黃魯直樣作棗心者魯公不獨喜毛穎亦多用長鬚主簿故諸葛氏遂有魯公羊毫樣俄為叔父文正公又出觀文樣既數數更其調度由是奔走時好至於挈竹臨巡閭閻貨雞錐子入奴臺手抄圭撮者爭先步武矣政和後諸葛氏之名於是頓息焉吾聞諸唐季時有名士就宣帥求諸葛氏筆而諸葛氏知其有書名乃持右軍筆二枝乞與其人不樂宣帥再索則以十枝去復報不入用諸葛氏懼因請宣帥一觀其書札乃曰似此持常筆與之耳前兩枝非右軍不能用也是諸葛氏非但藝之工其鑒識固不弱所以流傳將七百年向使能世其業如唐季時則諸葛氏門户豈遽滅息哉此言雖小可以喻大昔有張滋者真定人善和墨色光􅀢膠法精絶舉勝江南李廷圭大觀初時內相彥博許八座光凝共薦之於朝廷命造墨入官庫是後嵗加賜錢至三十二萬政和末魯公辭政而後止滋亦能自重方其得聲價時皇帝燕越二王呼滋至邸命出墨謂雖百金不吝也滋不肯曰滋非為利者今墨乃朝廷之命不敢私遺人二王乃丐於上詔各賜三十斤然滋所造實超今古其墨積大觀庫無慮數萬斤世謂其時用度廣空帑藏是悉繆誤不知元豐大觀二藏雖研墨蓋何事不見仍豐盛異常爾且以金師入時元豐與內帑自出河北山東精絹一千萬匹他絹則弗取以是證焉斯可知己江南李氏後主寶一研山徑長才踰咫前聳三十六峯皆大猶手指左右則引兩阜陂陀而中鑿為硯及江南國破研山因流轉數士人家為米元章得後米老之歸丹陽也念將卜宅久弗就而蘇仲恭學士之弟者才翁孫也號稱好事有甘露寺下並江一古宅多羣木蓋唐晉人所居時米老欲得宅而蘇覬得硯於是王彥昭侍郎兄弟與登北固共為之和會蘇米竟相易米後號海嶽菴者是也研山藏蘇氏未幾索入九禁時東坡公亦曾作一研山米老則有二其一曰芙蓉者頗崛奇後上亦自為二研山成視江南所寶流亞爾吾在政和未得罪時嘗預召入萬嵗洞至硯閣得盡見之太上留心文雅在大觀中命廣東漕臣督採端溪石硯上焉時未嘗動經費非宣和之事也乃括二廣頭子錢千萬日役五十夫久之得九千枚皆珍材也時以三千枚進御二千分賜大臣侍從而諸王內侍咸願得之詔更上千枚餘三千枚藏諸大觀庫於是俾有卧封禁端溪之下巖穴蓋欲後世獨貴是硯時人或不知厥由今世有得此者非常材矣國朝西北有二敵南有交趾故九夷八蠻罕所通道太宗時靈武受圍因詔西域若大食諸使是後可由海道來及哲宗朝始得火浣布七寸大以為異政和初進火浣布者已將半仞矣其後盈筥而至大抵若今之木棉布色微青􅀢蓋投之火中則潔白非鼠毛也御府使人自䌟績為中褥衣袍之屬多至不足貴亦可證舊説之偽奉宸庫者祖宗之珍藏也政和四年太上始自攬權綱不欲付諸臣下因踵藝祖故事檢察內諸司於是乘輿御馬而從以杖直于馬大內中諸司局大駭懼凡數日而止因是併奉宸俱入內藏庫時於奉宸中得龍涎香二琉璃缶玻璃母二大篚玻璃母者若今之鐵滓然塊大小猶兒拳人莫知其方又嵗久無籍且不知其所從來或云柴世宗顯德間大食所貢又謂真廟朝物也玻璃母諸璫以意用火煅而模寫之但能作珂子狀青紅黃白隨其色而不克自必也香則多分賜大臣近侍其模製甚大而質古外視不大佳每以一豆大爇之輒作異花氣芬郁滿座終日略不歇於是太上大奇之命籍被賜者隨數多寡復收取以歸中禁因號曰古龍涎為貴也諸大璫爭取一餅可直百緡金玉穴而以青絲貫之佩於頸時於衣領間摩挲以相示坐此遂作佩香焉今佩香蓋因古龍涎始也舊説薔薇水乃外國採薔薇花上露殆不然實用白金為矧為甑採薔薇花蒸氣成水則屢採屢蒸積而為香此所以不敗但異域薔薇花氣馨烈非常故大食國薔薇水雖貯琉璃缶中蠟蜜封其外然香猶透徹聞數十步灑著人衣袂經十數日不歇也至五羊效外國造香則不能得薔薇苐取素馨茉莉花為之亦足襲人鼻觀但視大食國真薔薇水猶奴爾香木初一種也膏脈貫溢則其結沈水香然沈水香其類四有謂之熟結自然其間凝實者也謂之脫落因木朽而解者也謂之生結人以刀斧傷之而後膏脈聚焉故言生結也謂之蠱漏蟲嚙而後膏脈聚焉故言蠱漏也自然脫落為上而其氣和生結蠱漏則其氣烈斯為下矣沈水香過四者外則有半結半不結為弄水沈弄水香者番語多婆菜者是也因其半結則實而色重半不結則大不實而色褐好事者故謂之鷓鴣斑也婆菜中則復有名花盤頭水盤頭結實厚者亦近乎沈水但香木被伐其根盤必有膏脈湧溢故亦結但數為水淫其氣頗腥烈故婆菜中水盤頭為下矣餘雖有香氣既不大凝實若是一品號為箋香大凡沉水婆菜箋香此三名嘗出於一種而每自髙下其品類名號為多爾不謂沈水婆菜箋香各别有種也三者其産占城國則不若真臘國真臘國不若海南諸黎洞又皆不若萬安吉陽兩軍之間黎母山至是為冠絶天下之香無能及之矣又海北則有髙化二郡亦出香然無是三者之別苐為一種類箋之上者吾久處夷中厭聞沈水香况邇者貴遊取之多海南真水沈一星直一萬居貧賤安得之因反善海北香若凌水地號瓦竈者高地號浪灘者包中時時擇其高勝爇一炷其香味淺短乃更作花氣百和旖旎古人説香暨續本草酉陽雜俎諸家流語殆非其要合浦珠大抵四五所皆居海洋中間也名訖寶名斷望者最而斷望地近交趾號産珠尤美大父老更傳昔珠還時蓋自海際珠母生猶山然髙壘數百千丈甚或出露波濤上雅不知得幾何代也刺史者每啓其貪欲心或由是暴虐人人不自聊此珠所以去去皆逺陟從交趾真臘諸異國而珠母益不生就生亦不實矣俗言珠母者謂蚌也凡採珠必蛋人號曰蛋户丁為蛋丁亦王民爾狀怪醜能苦辛常業捕魚生皆居海艇中男女活計世世弗嘗捨也採珠弗以時衆咸裹糧會大艇以十數環池左右以石懸大絙至海底名曰定石則别以小繩繫諸蛋腰蛋乃閉氣隨大絙直下數十百丈捨絙而摸取珠母曾未移時然氣已迫則亟撼小繩繩動舶人覺乃絞取人緣大絙上出輒大呌因倒死久之始蘇若遇天大寒既出而呌必又急沃以苦酒可升許飲之釂於是七竅為出血久復活其苦如是世且弗知也父老云頃熙寧末安南連陷欽廉被系虜生靈嗸嗸事甫定而珠為盛還當是時商賈走四方爭輻湊逺民賴以安樂竟坐主者寖婪濁則珠寖徙去久矣中興後乃復還海底積髙才數尋一刺史來得此大喜即妄為辭以罔其上請復舊貫因縛繫諸蛋慘其刑一方始大騷走視珠母則莽見白沙布底爾徒得珠母雖合數千百既破開略無一珠羣蛋獨環之則大笑弗恤也自是以貢則求諸他且又如配率開告訐凡桎梏而破産者大率皆無辜千里告病然耳目之者又弗為惻是天以珠池毒禍吾民也吾聞此為憮然後讀熙陵實録見書太平興國七年事某月甲子海門採珠場獻真珠五千斤皆徑寸者為掩卷眷愕何其異哉而致是歟久而思之此無他知實命吏之效太宗時得巧匠因親督視於紫雲樓下造金帶得三十條匠者為之神耗而死於是獨以一賜曹武穆彬其一太宗自御之後隨入熙陵而曹氏所賜帶即莫測何往也餘二十八條時命貯之庫號鎮庫帶焉後人苐徒傳其名而宗戚羣璫間一有服金帶異花精緻者人往往輒指目此紫雲樓帶其實非也故吾逸不得一識之自貯鎮庫帶後僅歷百十年所及北騎入侵太上皇狩丹陽因盡挈鎮庫帶以往而一時從行者有若童貫伯氏諸貴皆得賜紫雲樓金帶矣事後甫平太上皇言歸宫闕於是靖康皇帝復命追還之庫吾在萬里外獨嘗聞諸然又不得一識也中興之十三祀有來自海外忽出紫雲樓帶止以四夸示吾北騎再入適紛紜所追還弗及者其金紫磨也光艷溢目異常金又其文作醉拂牀狀拂床人皆笑起長不及寸眉宛若生動雖吳道子畫所弗及若其華紋則有六七級層層為之鏤之精其微細之象殆入於鬼神而不可名且往時諸帶方􅀈不大此帶乃獨大至十二稻是在往時為窮極巨寶不覺為之再拜太息我祖宗規模雖一帶猶貽厥後世必無以加也於是亟歸諸客而意始適平因書此以詔後之人都邑惠民多增五局貨藥濟四方甚盛舉也嵗校出入得息錢四十萬緡入户部助經費然往時議者甚大不然矣時上每飭和劑局凡藥材告闕俾時上請焉大觀間和劑局官一日請內帑授藥犀百數歸解之偶忽得一株大絶常犀且異甚因不敢用復上之朝廷乃命工為之帶雖工人亦歎駭此上德有所感召之效矣蓋倒透中反成正透其面猶黃蠟中有異雲一朵雲中天矯一金龍飛盤拏空爪角俱全遂為御府第一號瑞雲盤龍御帶于闐國朝貢使每來朝必擕其寶鐺以返往自國初以來逮今如是也我主客備見之寶一鐵鐺爾蓋其來入中國道涉流沙踰三日程無水火獨挈其水而行投鐺者投之以水頃輒已百沸矣用是得不乏故寶之伯父君謨水精枕中嘗得有桃花一枝宛如新折茶甌十兔毫四散其中凝然作雙蛺蝶狀熟視若無動每寶惜之錢塘之龍華寺有傳大士真身仍藏所謂敲門椎頌金剛經相板輿藕絲燈三物昔為吳越錢王從婺女雙林取來藕絲者乃梁武帝時物也繆言藕絲織成懼不然但疑當時內府工料之所織紋實華嚴繪釋氏設法相狀凡七所即所謂七處九會者是也有天人鬼神龍象宫殿之屬窮極幻妙奇特不可名政和後索入九禁宣和初既大黜釋氏教因復以藕絲燈賜宦者梁師成吾昔在錢塘見之後於梁師成家得詳識焉師成靖康間籍沒而藕絲燈者莫知何在唐雷氏由德宗來世擅斫琴箸名遇其得意玉識之故國初尚方所藏玉鶴琴獨為世甲觀在仁宗時錢塘有名人水丘者又得玉鴈琴而君謨伯父帖曰聞賢郎在錢塘得玉鴈琴與玉鶴為輩流玉鶴藏禁中而鴈落人間此其常物也哉其後玉鴈琴吾得一見頗不稱其譽又唐李汧公者號喜琴乃自聚靈材為之曰百衲琴百衲琴流傳當祐陵朝亦入九禁是天下號殊絶獨玉鶴百衲乃第一上時方稽古博雅若書畫奇工得以待詔日親近往往獲褒賜而琴工獨間冷日減光赫因日月以冀恩澤即共奏取御府所寶琴盡丐理治之上亦可焉於是首取百衲琴破之乃止八段然膠漆遽解散羣待詔反大懼輒鹵莽僅得合併玉鶴背八九咸被壞遂得於時奏功第賞但求金石之奏思得山水之清音無矣此良足惜者閩粵有福清縣瀕海人家於海中撈得一物乃藤奩開奩白木枕一枕之則管絃四發又有青毛坐褥十坐其上毛輒颯然竪起擁匝人腰溫柔不可名愚氓懼以為怪遂并奩焚之福清士人來為吾言乃中興之初也金𧖟毒始蜀中近及湖廣閩粵寖多有人或拾此去則謂之嫁金蠶率以黃金叉器錦段置道左俾他人得焉鬱林守相晤時為吾言嘗見福清縣有訟遭金蠶毒者縣官治求不得蹤或獻謀取兩刺蝟入捕必獲矣蓋金𧖟畏蝟蝟入其家金𧖟則不敢動雖匿榻下墻罅果為兩蝟擒出之亦可駭也又嶠嶺多蜈蚣動長二三寸螫人求死不得然獨畏托胎蟲必放自落於地蜈蚣為局縮不得行托胎蟲乃徐徐圍繞周匝蜈蚣愈益縮然後登其首啖腦而食之死故人遭蜈蚣害必取托胎蟲涎輒生搗塗焉痛立止且金𧖟甚毒若有鬼神蜈蚣若是之強且大也然則蝟捕金𧖟托胎制蜈蚣物理有不可致詰而不可不知者如此往時川蜀俗喜行毒而成都故事嵗以天中重陽時開大慈寺多聚人物出百貨其間號名藥市者於是有於忩隙間呼貨藥一聲人識其意亟投以千錢乃從窗隙間度藥一粒號解毒丸一粒可救一人命夫迹既叵測故時多疑出神仙政和間祐陵以仁經惠天下嘗即上清寶籙宫之前新作兩亭左曰仁濟給藥治疾苦右曰輔正主符水除邪鬼因遂詔海內凡藥之治病彰彰有聲者悉索其方書而上之焉於是成都守臣監司奉命相與窮其狀乃始得售解毒丹家蓋世世懼行毒者為讐害故匿其迹非有所謂神仙也既據方修治得其全即并藥奏御事下殿中省上曰朕自弛天子所服御以濟元元毋煩有司也由是殿中省羣醫驗諸師驗其方則王氏博濟方中之保靈丹方爾當是時猶子行適領殿中監事故獨得其詳吾落南來用是藥嘗救兩人食葫蔓草毒得不死蓋不可不書太上受命享萬乘至尊之福而一時諸福之物畢至如好奇賞異故天下瑰珠舉入尚方皆萃於宣和殿小庫宣和殿小庫者天子之私藏也頃聞之以寵妃之侍從者頒首飾上善而賜之命內侍取北珠篋來上開篋御手親掬而酌之凡五七酌以賚焉初不計其數也且又不知其幾篋北珠在宣和間圍寸者價至三二百萬又乙巳嵗冬魯公得疾甚殆上為臨問而醫者奏當進附子物上意惻怛命主小庫內侍舉附子以進御手亦為採擇取四遣中使賜魯公率大猶拳其一重有三兩四錢次有三兩二錢二皆二兩八錢吾狂妄平居眼孔隘宇宙覩此亦歎所未始見則他可稱是薑芥一名暇蘇本草謂性溫不然實微涼吾竄嶠嶺數見食黃顙魚偶犯薑芥者必立死甚於鉤吻毒矣物性相反有可畏如是世於是禁殆不可不知零陵香草生九疑間實産舜墓然今二廣所向多有之在嶺南初不大香一持出嶺北則氣頓馨烈南方至易得富者往往紐以為抹薦也建溪龍茶始江南李氏號北苑龍焙者在一山之中間其周遭則諸茶地也居是山號正焙一出是山之外則曰外焙正焙外焙色香必迥殊此亦山秀地靈所鍾之有異色已龍焙又號官焙始但有龍鳳大團二品而已仁廟朝伯父君謨名知茶因進小龍團為時珍貴因有大團小團之別小龍團見於歐陽文忠公歸田録至神祖時即龍焙又進密雲籠者其雲紋細密更精絶於小龍團也及哲宗朝益復歸瑞雲翔龍者御府嵗止得十二餅焉其後祐陵雅好尚故大觀初龍焙於嵗貢色目外仍進御苑玉芽萬夀龍芽政和間且增以長壽玉圭五圭凡有數種大抵北苑絶品曾不過是嵗但可十百餅然名益新品益出而舊格遞降於凡劣爾又茶茁其芽貴在於社前則已進御自是迤邐宣和間皆占冬至而嘗新茗是率人力為之反不近自然矣茶之尚蓋自唐人始至本朝為盛而本朝又至祐陵時益窮極新出而無以加矣漢宣帝在仄微有售餅之意見於漢紀至今凡千百嵗而關中餅師每圖宣帝像於肆中今殆成俗漢氏之德於世如此也開寶末吳越王錢俶始來朝垂至太祖謂太官錢王浙人也來朝宿共帳內殿矣宣創作南食一二以燕衎之於是太官倉猝被命一夕取肥羊為醢以獻焉因號旋鮓至今大燕首薦是味為本朝故事种師服名將也出陜右元祐時朝廷付之以邊事吕丞相大防始召之飯舉筯沙魚線甚俊吕丞相喜問君解識此物邪种操其西音曰不托便不識至今傳以為笑魯公盛德蓋自小官時搢紳間一辭謂之有手段元祐時守維揚多過客日夕盈府寺一日本是蚤膳召客為涼餅會者八人俄報客繼至者公必留偶紛紛來又不已坐間私語蔡四素號有手段今率迫留客且若是他食輒咄嗟為尚可如涼餅者奈何便辦耶請共嘗之及食時計留客則已四十人而冷淘皆至仍精腆時以為談柄太上皇在位時屬升平手藝人之有稱者碁則劉仲甫號國手第一相繼有晉士明又逸羣琴則僧梵如者海大師之上足也然有左手無右手梵如之亞僧則全根本領雅不及梵如但不措能作金石聲教坊琵琶則有劉繼安舞有雷中慶世皆呼之為雷大使笛有孟水清此數人者視前代之伎一皆過之獨丹青以上皇自擅其神逸故凡名手多入內供奉代御染寫是以無聞焉爾劉仲甫碁士大夫持以較唐開元國手王積薪而仲甫猶出積薪上兩道但仲甫亦自挾數術能彌縫士君子故喜其為人由是名譽益表暴著碁經效孫子十三篇又作造微精理諸集盛見碁之布置用意成一家説世遂謂無以過之矣及政和初晉士明者自河東來輦下方年二十八九獨直出仲甫右一時又較之乃高仲甫兩道猶有餘其藝左右縱橫特神出鬼沒於是名聲一旦赫然即日富貴然終不棄置其故妻搢紳間猶多之先哲廟時有碁手號王憨子者以其能迫仲甫未幾而病心死故世以謂仲甫隂害之也及士明出仲甫間而呼之與角遂為士明再四連敗之於是仲甫乃欲以女妻之則又辭曰我有室矣仲甫悵不悅居月餘偶以病殂往往為士明所挫死故好事者益為浮言計憨子死之嵗者實士眀生之年也則士明果憨子之後身造物者俾之復其讐云花蕊夫人蜀王建妾也後號小徐妃者大徐妃生王衍而小徐妃其女弟在王衍時二徐坐遊燕淫亂亡其國莊宗平蜀後二徐隨王衍歸中國半途遭害焉及孟氏再有蜀傳至其子昶則又有一花蕊夫人作宫詞者是也國朝降下西蜀而花蕊夫人又隨昶歸中國昶至且十日則召花蕊夫人入宫中而昶遂死昌陵後亦惑之嘗進毒屢為患不能太宗在晉邸時數數諫昌陵而未克去一日兄弟相與獵苑中花蕊夫人在側晉邸方調弓矢引滿政擬走獸忽回射花蕊夫人一箭而死殆所傳多偽不知蜀有兩花蕊夫人皆亡國且殺其身本朝宦者之盛莫盛於宣和間其源由嘉祐元豐著於元祐而元祐時有李憲者則已節制陜右諸將議臣如鄧中司潤甫力止其漸不可憲遂用事矣至元祐又以垂簾者久故其徒得與聞政機關通廊廟且爭事名譽有陳術者迹狀既露後又撼天子太上懼多以邸中舊寶帶賂之得稍止及親政而竟殺之焉然勢已張若禁綱則具在也及崇寧初上與魯公弗能戒於是開寄班法因寖任事大觀後遂有官至皇城使官達者至引進客省矣至外廷舊規餘風則猶尚存也時士大夫則由公輔而進恥從此徒亦罕敢交通及政和三四年由上自攬權綱政歸九重而後皆以御筆從事於是宦者乃出無復自顧藉祖宗垂裕之模蕩矣蓋自崇寧既踵元豐任李憲故事命童貫監王厚軍下青唐後貫因盡攘取陜右兵權魯公再從東南召復相而力道之朝廷降詔差方劭察訪五路然遏之不得更反折角政和末遂寢領樞管擅武柄主廟算而梁師成者則坐籌帷幄其事任類古輔政者一時宰相執政悉出其門如中書門下徒奉行文書於是國家將相之任文武二道咸歸此二人因公立黨伍甚於水火又當是時御筆既行互相抵排都邑內外無所適從羣臣有司大懼得罪必得宦人領之則可入奏緩急有所主故諸司局務爭奏乞中官提領是後大小事百司上下之權悉由閹寺外路則有廉訪使者或置承受官於是天下一聽而紀律大紊矣宣和之初暨中間宦人有至太師少保節度使正使承宣觀察者比比焉朝廷貴臣亦皆由其門遂不復有廟堂士大夫始盡向之朝班禁近咸更相指曰此立里客也此木腳客也反以為榮而爭趨羡之能自飭勵者無幾矣魯公則居家悔歎每至啜泣而上亦覺其難制始殺馮浩又殺王堯臣若楊十成宣小李使皆死不明連剗數人然勢已成未睹其益而羣閹既懼思脫禍無術則愈事燕遊用蠱上心求免夫朝夕識者深憂且疑有蕭墻之變漢唐之事了在目前俄禍自外來大敵適破都人憤泄至殺之啖之骨血無餘矣凡此始終自非皇天擁祐聖祚不然可勝殆哉故書其略如此政和以還侍從大臣多奴事諸璫而取富貴其倡始者首有王丞相黼事梁師成俄則盛尹章事何炘宋八座事王仍後又有王右轄故事亦事師成此最彰著者宣和以降則士大夫悉歸之內寺之門矣黼則呼師成為恩府先生每父事之安中在翰苑凡草師成麻制必極力作為好辭美句褒頌功德時人謂之王內相上梁師成啓事章則與欣奉藥而進升對人呼王仍為王爺又有劉韐者自小官在童貫幕始終與之盡力後仕至延康殿學士及都邑傾覆先索韐入金營既兩宫將播遷韐聞之又知金欲用韐遂自縊而死獨能以忠節蓋前迹矣漢元狩二年南越獻馴象能言鳥應卲注能言鳥鸚鵡也然二廣間鸚鵡視隴右實差小若曰五色又自出外國但今西甌之地適春夏間山青澗碧而木綿花發紅樹滿目如與相間錯即多有鸚鵡羣飛動千數且高下爭掠人頭面聞其聲咬咬可喜疑若別作一道家羡門方域中爾人或得其雛養視而教諸語言初皆丹喙中變而黑度嵗餘乃復丹始不變此雄者也號名鸚鵡有喙常黑而不變此獨雌者號名木戾是二種者實藉人力而致之言語罕有合其自然至百數十中忽一天機辨慧始雖因教然終乃同諸人而性靈斯足尚矣吾頃見二車陳端誠家一鸚鵡能自談對睹老兵㩦米笥出則報曰院子偷物出也在簞內其小奴竊酒又亟報曰惠奴偷酒衆爭視之窮詰略無迹反罪其妄乃又曰藏桌下矣共驗之信於是奴婢大憤後以計而殺之也嘗讀殷藝小説載晉張華有鸚鵡每出還輒説僮僕好惡一日寂無言華問其故曰被禁在甕中何因得知事殆類此都下飛鳶至多而大內中為最每集英殿下燕則飛鳶動千百為羣舞翅庭中百官燕食至則多為所掠故事遇燕設乃於鄰殿置肉以賜鳶後稍得引去然尚多有之也周官射鳥氏賔客會同以弓矢驅鳥鳶然則鳶之善鈔盜有自來矣今乘輿在御又鳶飛既衆是弓矢有不可驅者故賜鳶肉乃出本朝苐不知其始私竊謂儻非仁廟之至仁必由祖宗之聖惠矣魯公以元祐末帥蜀道過一小館有物倒懸於梁間初疑為怪後見古今注乃知為蝙蝠也又抱朴子亦謂蝙蝠五百嵗即白而甸懸食之壽如其年吾每記公此談靖康初貶邵陵始發自長沙愒一長亭方坐忽有類鴉鴿從房中飛掠吾目過者時亦以為怪迹其蹤乃在堂中後空舍而倒懸則知其為伏翼矣大為之感愴俄遷嶺外博白暇日適與客行天慶祠才升殿則觀梁間纍然倒懸者以十數偷眼伺人久忽飛去博白天慶祠實唐紫極宫也則是物亦不下三四百嵗矣客有力勸吾羅捕取而盡食之者因為之一哂政和中于闐國朝貢以馬四匹其一髙六尺五寸其一六尺二寸其二皆五尺九寸殆不類常馬其狀已怪則穆王八駿其圖天矯宜若有之相州古鄴郡其西有隆慮名山也寺則齊禪師道場亦有名剎也寺大門之前左右二池東為黃龍西為白龍所窟宅政和間適大旱安陽人禱於池既大澍於是一時為之飛奏詔加封爵焉及褒命下世俗不知厥由但迎置諸東池而已一旦雲霧四合如墨天大電雷異常有頃衆登寺樓望則了然見白龍與黃龍拏戰而黃龍敗焉白龍乃奮迅下取山嶺將塞東池垂白矣黃龍既護其居故屢鬬而屢敗且不已其右山谷間白龍之所據則水屯于門之外波浪髙踰似樓也羣髠大懼為焚香唪咒於樓之上始寤向之大雨實白龍為之而黃龍冒其賞故一至此競於是寺髠力為之講解仍請再告諸上終日始得平白龍因收水而退矣詔復封白龍焉吾妻家相人也有妻兄檢得親見故特為吾道之且龍號稱神物能變化識髙逺乃亦爭虛名角勝負未免作世俗態所以貴乎君子江湖間小龍號靈異見諸傳説甚究崇寧中淮水暴漲而汴口檣舟不能進一日昧爽小龍者出蟠依於舟尾有柁工之婦不識也謂是蜥蜴撥置之則跂跂又緣柁而上柁工之婦怒舉火柴擊其首隨擊霹靂大震一聲汴口所積舟不問官私舟與士大夫家座船七百隻舉自相撞擊俱碎死數十百人朝廷聞而不樂苐命官為賑恤焉會發運使上計而小龍者又復出大漕甚窘懼乃焚香祝之願與王偕上計入覲天子可乎龍即作喜悅狀因舉身入香奩兩爪據金杯飲幾酹於是天子異之取大琉璃缶貯龍為親加封識焉降付都城汴水之都門外小龍祠中一夕封識宛如故視缶中龍則已變化去矣上喜加封四字仍大敞其祠宇至大觀末魯公責東南舟行始抵汴口而小龍又出迓魯公然小龍所隸南北當江湖間素不至二浙也政和壬辰魯公在錢塘居鳳山之下私第以正月七日小龍忽出佛堂中於是家人大小咸歎異亦疑必有故明日而魯公召命至復加六字王及靖康之初家破魯貶嶺外吾從行至江陵將遵陸出鼎澧間公畏暑因改卜舟行下江陵憩渚宫之沙頭一倉官廳舍才弛擔則小龍復出見魯公為之涕下且感念龍神乃不忘恩舊一如此吾戲公曰固知小龍之必來爾公愕詢其故吾始曰此亦出公之門也茍每加意於是無世情者則今日必來使此龍一出世間有世情當又不來是烏足辱人懷抱邪公乃收淚而笑且龍神爾有義風有古聖賢操烈因為書其初末是亦春秋褒貶之餘旨不敢廢者矣宣和元年夏五月都邑大水未作前雨數日連夕如傾及霽開封縣前茶肆有晨起拭床榻者睹若有大犬蹲其旁明視之龍也其人大呌而倒茶肆適與軍器作坊近遂為作坊士羣取而食之屏不敢奏都人皆圖畫傳玩其身僅六七尺若世所繪龍鱗作蒼黑色然驢首而兩頰宛如魚頭色正緑頂有角座極長其際始分兩歧焉又其聲如牛考諸傳記實龍也後十餘日大水至故俗傳謂之龍復讐世罕識龍象獅薛八丈黃門昂錢塘人也始位左轄其小君因出遊還適過宣德端門時郊禋禮近有司日按象自外旗鼓迎至闕下而馴習之夫人偶過焉適見而大駭歸告其夫曰異哉左丞我儂今日過大內前安得有此大鼻驢焉人傳以為笑唐人説江東不識槖駝謂是廬山精况今南粵宜未嘗過五嶺也頃因雲擾後有北客驅馳槖駝來吾時在博白博白人小大為鼓舞爭欲一識客輒闔户蔽障丐取十數金即許一入如是遍歷瀕海諸郡藉槖駝致富矣後槖駝因瘴癘死其家如喪其怙恃嶺右頃俗淳物賤吾以靖康嵗丙午遷博白時虎未始傷人村落間獨竊人家羊豕雖婦人小兒見則呼而逐之必委置而走有客嘗過墟井繫馬民舍籬下虎來瞰籬客為懼民曰此何足畏從籬旁一叱而虎已去村人視虎猶犬豕爾十年之後北方流寓者日益衆風聲日益變加百物湧貴而虎寖傷人今則與內地弗殊啖人略不遺毛髮風俗澆厚乃亦及禽獸耶先王中孚之道信及豚魚知必不誣博白有逺村號録含皆髙山大水人足迹所弗及斗米一二錢蓋山險不可出有小江號龍贊魚大者動長六七尺皆癡不識人也村民自誇我山多鳳凰吾且謂妄從而詰之則曰其大如鵝五色有冠率居大木之巔穴木而巢焉遇天氣清明必出出必雙雙而飛所過則羣鳥舉為之斂翼俯首而伏不敢鳴者久之吾嘆曰此真鳳凰也古人謂南方丹山産鳳為信博白張生公愕者蜀人喜學問能苦辛卜築於城西北隅山間盛概也吾手助其緝茅既成名曰帶經堂下劚地得山蕷自然成玄武者龜大於掌首尾克全蛇乃夭矯纏龜猶世圖狀張生以獻吾為再拜烹而食之既物理有是不可致詰者苑囿最盛宣和末所謂艮嶽正門曰陽華亦五戟制同宸禁也自陽華門入則夾道荔枝八十株當前椰實一株有太湖石曰神運昭功髙四十六尺立其中為亭以覆之每召要臣流覽其間則一璫執荔枝簿立石亭下中使一人宣旨人各賜若干於是主者乃對簿按樹以分賜朱銷而奏審焉吾一日偶獲侍從魯公入時許共賞椰實一小璫登梯就摘而剖之諸璫人荔枝二枚於是大璫梁師成者盡愕然吾笑而顧之曰諸人久飫矣且饒吾一路蓋是時群璫多尚文字妄相慕仰咸以吾未始得嘗故也語此一夢令人愴悵蒲中産梨棗已久得名昔唐太宗時有鳳儀止梨樹上因變肌肉細膩紅頰玉液至今號鳳栖梨也一本朝時一家獨出一種青袍瓊肌香脆甘寒備衆梨之美又勝絶於鳳栖其人常進御後得文林郎且以青膚足珍類選人之衫色因但號之曰文林郎嵗罕得稔遇稔則但歸諸碧油幕下帥二共分餉焉他莫得入口矣吾得於張守周佐嘗官蒲故能道之張名仲奭雒陽牡丹號冠海內歐陽文忠公有譜言之備然吾狂病未得時嘗侍魯公入應宣召延福宫賞花內宴私竊謂海內之至極者也及靖康初元魯公司河南吾獨從魯公行時適春三月矣略得見洛陽牡丹一二始知九重之燕賞殆虛設而文忠公之語其殆雅有未究者因問諸洛陽人為吾言姚黃檀心碧蟬生異花黃獨號花王雖有其名亦不時得率四三嵗一開開或得一兩本而已遇其一必傾城其人若狂而走觀彼餘花縱盛弗視也於是姚黃花圃主人是嵗為之一富又吾見二父言元豐中神宗嘗幸金明池是日洛陽適進姚黃一朵花面盈尺有二寸遂却宫花不御乃獨簮姚黃以歸至今傳以為盛事維揚芍藥甲天下其間一花若紫袍而中有黃線者名金腰帶金腰帶不偶得之維揚傳一開則為世瑞且簪是花者位必至宰相蓋數數驗昔韓魏公以樞密副使出維揚一日金腰帶忽出四蕊魏異之乃燕平生所期望者三人與共賞焉時王丞相禹玉為監郡王丞相介甫同一人俱在幕下及將燕而一客以病方謝不敏及旦日吕司空晦叔為過客來魏公尤喜因留吕司空合四人者咸簮金腰帶其後四人果皆輔相矣或謂過客乃陳丞相秀公然吾舊聞此又得是説於吕司空疑非陳丞相也是後魯公守維揚金腰帶一枝又出則魯公簮之而魯公亦位極未幾叔父文正公亦嘗守維揚維揚一旦金腰帶又出而維揚人大喜貪文正公之重望亟折以獻然花適開未全也文正公為之悵然亦簪而賞之焉久之文正公獨為樞密使後加使相檢校少保視宰相恩數噫一花之異有曲折與人合乃若造物戲人乎鐵圍山叢談卷六
