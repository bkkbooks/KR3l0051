body:
  text: 鐵圍山叢談小説家類一雜事之屬提要臣等謹案鐵圍山叢談六卷宋蔡絛撰絛字約之自號百衲居士興化仙遊人蔡京之季子也官至徽猷閣待制京敗流白州宋史附載京傳末稱宣和六年京再起領三省目昏眊不能視事悉決於絛凡京所判皆絛為之且代京入奏由是恣為姦利竊弄威柄宰臣白時中李邦彥惟奉行文書其罪蓋與京等曾敏行獨醒雜志則載絛作西清詩話多稱引蘇黃諸人竟以崇尚元祐之學為言者論列蓋雖盜權怙勢而尚知博風雅之名者陳振孫書録解題稱西清詩話乃絛使其客為之殆以蔡攸雖領書局懵不知學為物論所不歸故疑絛所著作亦出假手然此書作于竄逐之後黨與解散誰與捉刀而敘述舊聞具有文采故謂之驕恣紈袴則可不能謂之不知書也書中稱髙宗為今上謝石相字一條稱中原傾覆後二十一年為紹興十七年徽宗買􅚬香一條稱中興嵗戊辰為紹興十八年又趙鼎亦卒於紹興十七年而此書記鼎卒後王躍坐調護鼎被劾罷官過白州見絛之事是南渡後二十餘年尚謫居無恙亦可云幸逃顯戮矣絛所作北征紀實二卷述伐燕之事陳振孫謂其歸罪童貫蔡攸為蔡京文飾此書所敘京事亦往往如是史稱京患言者議已作御筆密進丐徽宗親書以降絛則稱政和三四年上自攬權綱政歸九重皆以御筆從事史稱京由童貫以進又稱宦官宫妾合詞譽京絛則稱京力遏宧官史稱范祖禹劉安世皆因京逺竄絛則謂京欲援復安世及陳瓘而不能已則與祖禹子溫最相契其巧為彌縫大抵類此惟於其兄攸無恕詞蓋以攸嘗劾絛又請京殺絛故也至于元祐黨籍不置一語詞氣之間頗與其父異趣於三蘇尤極意推崇而丁仙現一條乃深詆王安石新法則仍其西清詩話之旨也他如述九璽之源流元圭之形製九鼎之鑄造三館之建置大晟樂之宫律及徽宗五改年號之義公主初改帝嬴後改帝姬之故宣和書譜畫譜博古圖之緣起記所目睹皆較他書為詳核以及辨禁中無六更之例宫花有三等之别俗諺包彈之始粵人雞卜之法諸葛氏筆張滋墨米芾研山大觀端研玻璃毋龍涎香薔薇水沈水香合浦珠鎮庫帶藕絲燈百衲琴建溪茶姚黃花諸條皆足以資考證廣異聞又如陳師道後山詩話稱蘇軾詞如教坊雷大使舞諸家引為故實而不知雷為何人觀此書乃知為雷中慶宣和中以善舞隸教坊三經新義宋人皆稱王安石觀此書惟周禮為安石親筆詩書實出王雱為厯來考據家所未言其人雖不足道以其書論之亦説部之佳本矣文獻通考作五卷此本實六卷或通考傳寫之誤歟乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
